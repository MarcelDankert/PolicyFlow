name: PolicyFlow Governance

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate-policyflow:
    runs-on: ubuntu-latest
    env:
      POLICYFLOW_VERSION: "0.1.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PolicyFlow
        run: python -m pip install "policyflow==${POLICYFLOW_VERSION}"

      - name: Fetch live PR body
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .body > pr-body.md

      - name: Fetch PR reviews
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" > pr-reviews.json

      - name: Validate PR body governance
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python - <<'PY' > workflow-path.txt
          from pathlib import Path
          import re
          import sys

          text = Path("pr-body.md").read_text(encoding="utf-8")
          current_section = None
          headings = []
          workflow_file_lines = []
          workflow_file_section_present = False

          for line in text.splitlines():
              if line.startswith("## "):
                  current_section = line[3:].strip()
                  headings.append(current_section)
                  if current_section == "Workflow File":
                      workflow_file_section_present = True
                  continue

              if current_section == "Workflow File":
                  workflow_file_lines.append(line)

          for line in workflow_file_lines:
              cleaned = re.sub(r"^-+\s*", "", line.strip()).strip("` ")
              if cleaned:
                  print(cleaned)
                  break
          else:
              if workflow_file_section_present:
                  message = "PR body Workflow File section is empty."
              else:
                  message = "PR body must include a Workflow File section."
              headings_text = ", ".join(headings) if headings else "none"
              sys.stderr.write(
                  f"{message} PR body length: {len(text)} characters. "
                  f"Markdown headings found: {headings_text}.\n"
              )
              raise SystemExit(1)
          PY

          workflow_path=$(cat workflow-path.txt)

          if [ ! -f "$workflow_path" ]; then
            echo "Workflow file from PR body not found: $workflow_path"
            exit 1
          fi

          policyflow validate-pr "$workflow_path" pr-body.md
          policyflow validate-github-approvals "$workflow_path" pr-body.md pr-reviews.json

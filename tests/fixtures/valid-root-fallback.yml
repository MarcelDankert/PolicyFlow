workflow:
  id: valid-root-fallback
  type: feature

workflow_file: workflows/examples/root-fallback.yml
risk_level: LOW
confidence:
  planning: Root fallback planning confidence is documented.
  implementation: Root fallback implementation confidence is bounded.
  tests: Root fallback test confidence is documented.
  residual_uncertainty: Root fallback residual uncertainty is tracked.
required_reviews:
  - review-agent
human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending

evidence:
  planning:
    summary: Root fallback fixture locks scope and risk before implementation.
    scope_locked:
      - bounded feature change
    non_goals_locked:
      - no protected area changes
    risk_rationale: LOW-risk fallback fixture.

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock the fallback low-risk scope before implementation.
    acceptance_criteria:
      - workflow scope is bounded
    approved_scope:
      - bounded feature change
    non_goals:
      - no protected area changes
    initial_risk_level: LOW
    protected_areas_touched:
      - none
    confidence_summary: High confidence in the bounded low-risk fallback slice.
    escalation_flags:
      - none


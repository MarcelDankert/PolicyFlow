workflow:
  id: valid-root-fallback
  type: feature

workflow_file: workflows/examples/root-fallback.yml
risk_level: LOW
required_reviews:
  - review-agent
human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending

evidence:
  planning:
    summary: Root fallback fixture locks scope and risk before implementation.
    scope_locked:
      - bounded feature change
    non_goals_locked:
      - no protected area changes
    risk_rationale: LOW-risk fallback fixture.

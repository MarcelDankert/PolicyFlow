workflow:
  id: invalid-review-evidence
  type: feature

context:
  workflow_file: workflows/examples/invalid-review-evidence.yml
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: completed
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and risk locked before coding.
    scope_locked:
      - parser validation
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded workflow-only change.
  architecture-check:
    decision: Explicit architecture check required for MEDIUM risk.
    constraints:
      - keep scope bounded
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: No blocking issues found.

workflow:
  id: valid-medium
  type: bugfix

context:
  workflow_file: workflows/examples/valid-medium.yml
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Medium-risk scope and non-goals locked before coding.
    scope_locked:
      - parser validation
    non_goals_locked:
      - no contract changes
    risk_rationale: MEDIUM risk due to cross-check needs.
  architecture-check:
    decision: Architecture check completed before implementation.
    constraints:
      - keep implementation bounded
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock parser validation scope before coding.
    acceptance_criteria:
      - parser validation remains bounded
    approved_scope:
      - parser validation
    non_goals:
      - no contract changes
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium-risk scope is stable enough for architecture review.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture scope remains inside parser validation.
    approved_scope:
      - parser validation
    module_boundaries:
      - parser module only
    contract_impact: No contract changes required.
    risk_review_decision: MEDIUM risk path stays in place.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep implementation bounded

overrides:
  - id: phase-bypass-1
    type: phase_bypass
    reason: Review phase starts with a documented bounded overlap to preserve delivery cadence.
    scope_impact: No scope expansion; overlap stays inside parser validation.
    risk_impact: MEDIUM risk remains unchanged because compensating controls are explicit.
    mitigations:
      - review findings must still be resolved before QA completion
    approved_by: architecture-agent
    approval_reference: ARCH-OVERRIDE-1
    review_by: 2026-06-30
    bypassed_phase: review
    compensating_controls:
      - review findings tracked in the PR before QA sign-off

runtime:
  status: handoff_pending
  current_phase: architecture-check
  active_agent: senior-dev-agent
  last_transition: architecture-check completed and ready for implementation handoff

handoffs:
  - from_phase: architecture-check
    to_phase: implementation
    status: pending
    required_inputs:
      - architecture_assessment
      - implementation_constraints
    produced_outputs:
      - implementation_summary
      - test_summary
    blockers: []
    override_refs:
      - phase-bypass-1

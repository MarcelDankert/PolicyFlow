workflow:
  id: valid-loop-governance-schema
  type: feature

context:
  workflow_file: workflows/examples/valid-loop-governance-schema.yml
  risk_level: MEDIUM
  confidence:
    planning: Loop governance expectations are declared before implementation.
    implementation: Implementation remains bounded by declared loop governance.
    tests: Validation will confirm loop metadata is typed and declarative.
    residual_uncertainty: Review must confirm future validator semantics.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Loop model scope and non-goals were locked.
    scope_locked:
      - loop governance model
    non_goals_locked:
      - no loop execution
    risk_rationale: MEDIUM risk because loop schema affects future governance contracts.
  architecture-check:
    decision: Keep Loop Governance declarative and provider-neutral.
    constraints:
      - no loop execution
      - no scheduler
      - no message routing
      - no memory
    approval_path: architecture-agent review

loop_governance:
  loops:
    - id: review-feedback
      source_phase: review
      target_phase: implementation
      allowed_feedback_sources:
        - review-findings
        - qa-findings
        - security-scan
        - human-arbitration
        - evaluation-failure
      max_iterations: 3
      current_iteration: 1
      status: active
      stop_conditions:
        - id: review-findings-resolved
          description: All blocking review findings are resolved.
      escalation_conditions:
        - id: iteration-limit-reached
          trigger: max_iterations_exceeded
          escalate_to: human-arbitration
      evidence_refs:
        - evidence.review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Define typed Loop Governance model expectations.
    acceptance_criteria:
      - loop governance remains declarative
    approved_scope:
      - loop governance model
    non_goals:
      - no loop execution
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Loop fields are explicit enough for architecture review.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Loop Governance metadata does not create runtime execution ownership.
    approved_scope:
      - loop governance model
    module_boundaries:
      - workflow schema only
    contract_impact: No runtime or provider contract is introduced.
    risk_review_decision: MEDIUM risk remains appropriate.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep loop metadata provider-neutral

overrides: []

runtime:
  status: idle
  current_phase: implementation
  active_agent: senior-dev-agent
  last_transition: architecture-check completed

handoffs: []

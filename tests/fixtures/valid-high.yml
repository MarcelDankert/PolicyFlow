workflow:
  id: valid-high
  type: architecture-change

context:
  workflow_file: workflows/examples/valid-high.yml
  risk_level: HIGH

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
    - human approval
  human_approval_required: true
  escalation_required: true
  protected_areas_touched:
    - database schema
  approval_evidence:
    - approved in architecture review

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending
    - phase: approval
      state: pending

workflow:
  id: qa-before-review-complete
  type: feature

context:
  workflow_file: workflows/examples/qa-before-review-complete.yml
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress
    - phase: qa
      state: completed

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow update.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: Review is not actually complete yet.
    residual_risk: Review findings still in progress.
  qa:
    outcome: passed
    evidence_summary: QA was marked complete too early.
    unresolved_risks:
      - review not complete


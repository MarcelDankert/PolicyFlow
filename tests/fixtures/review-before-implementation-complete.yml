workflow:
  id: review-before-implementation-complete
  type: feature

context:
  workflow_file: workflows/examples/review-before-implementation-complete.yml
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
    - phase: review
      state: completed
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow update.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: Review was started too early.
    residual_risk: Implementation is still in progress.

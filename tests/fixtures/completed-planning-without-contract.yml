workflow:
  id: completed-planning-without-contract
  type: feature

context:
  workflow_file: workflows/examples/completed-planning-without-contract.yml
  risk_level: LOW

governance:
  required_reviews:
    - review-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending

evidence:
  planning:
    summary: Low-risk scope and non-goals locked before implementation.
    scope_locked:
      - bounded feature change
    non_goals_locked:
      - no protected area changes
    risk_rationale: LOW-risk change with review-agent coverage.

workflow:
  id: completed-implementation-without-contract
  type: feature

context:
  workflow_file: workflows/examples/completed-implementation-without-contract.yml
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
      - validation
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow change.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock reporting endpoint scope before coding.
    acceptance_criteria:
      - reporting endpoint remains bounded
      - validation stays inside workflow scope
    approved_scope:
      - reporting endpoint
      - validation
    non_goals:
      - no contract changes
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Scope and risk are stable for implementation.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture check kept the change inside current module boundaries.
    approved_scope:
      - reporting endpoint
      - validation
    module_boundaries:
      - runtime layer
    contract_impact: No contract changes required.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - preserve module boundaries


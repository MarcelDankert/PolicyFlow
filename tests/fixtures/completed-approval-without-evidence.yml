workflow:
  id: completed-approval-without-evidence
  type: architecture-change

context:
  workflow_file: workflows/examples/completed-approval-without-evidence.yml
  risk_level: HIGH

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
    - human approval
  human_approval_required: true
  escalation_required: true
  protected_areas_touched:
    - database schema
  approval_evidence:
    - approved in architecture review

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: completed
    - phase: qa
      state: completed
    - phase: approval
      state: completed

evidence:
  planning:
    summary: High-risk scope and protected-area context locked before coding.
    scope_locked:
      - architecture boundary update
    non_goals_locked:
      - no runtime behavior expansion
    risk_rationale: Protected area touched, so HIGH-risk path applies.
  architecture-check:
    decision: Architecture review completed before implementation.
    constraints:
      - require explicit human approval
    approval_path: architecture-agent review plus human approval
  review:
    outcome: approved
    findings_summary: Review completed with no blocking issues.
    residual_risk: bounded residual change-management risk only
  qa:
    outcome: passed
    evidence_summary: QA evidence completed successfully.
    unresolved_risks:
      - none

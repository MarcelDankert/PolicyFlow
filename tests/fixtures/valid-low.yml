workflow:
  id: valid-low
  type: feature

context:
  workflow_file: workflows/examples/valid-low.yml
  risk_level: LOW
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - review-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending

evidence:
  planning:
    summary: Low-risk scope and non-goals locked before implementation.
    scope_locked:
      - bounded feature change
    non_goals_locked:
      - no protected area changes
    risk_rationale: LOW-risk change with review-agent coverage.

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock the low-risk scope before implementation.
    acceptance_criteria:
      - workflow scope is bounded
    approved_scope:
      - bounded feature change
    non_goals:
      - no protected area changes
    initial_risk_level: LOW
    protected_areas_touched:
      - none
    confidence_summary: High confidence in the bounded low-risk slice.
    escalation_flags:
      - none


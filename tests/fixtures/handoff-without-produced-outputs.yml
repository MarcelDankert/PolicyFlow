workflow:
  id: handoff-without-produced-outputs
  type: feature

context:
  workflow_file: workflows/examples/handoff-without-produced-outputs.yml
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Medium-risk scope and non-goals locked before coding.
    scope_locked:
      - parser validation
    non_goals_locked:
      - no contract changes
    risk_rationale: MEDIUM risk due to cross-check needs.
  architecture-check:
    decision: Architecture check completed before implementation.
    constraints:
      - keep implementation bounded
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock parser validation scope before coding.
    acceptance_criteria:
      - parser validation remains bounded
    approved_scope:
      - parser validation
    non_goals:
      - no contract changes
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium-risk scope is stable enough for architecture review.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture scope remains inside parser validation.
    approved_scope:
      - parser validation
    module_boundaries:
      - parser module only
    contract_impact: No contract changes required.
    risk_review_decision: MEDIUM risk path stays in place.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep implementation bounded

handoffs:
  - from_phase: architecture-check
    to_phase: implementation
    status: pending
    required_inputs:
      - architecture_assessment
    produced_outputs: []
    blockers: []
    override_refs: []


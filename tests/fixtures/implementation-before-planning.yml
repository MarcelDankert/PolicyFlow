workflow:
  id: implementation-before-planning
  type: feature

context:
  workflow_file: workflows/examples/implementation-before-planning.yml
  risk_level: LOW
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - review-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: pending
    - phase: implementation
      state: in_progress
    - phase: review
      state: pending

evidence:
  planning:
    summary: Scope was drafted but planning is not complete yet.
    scope_locked:
      - bounded feature change
    non_goals_locked:
      - no runtime changes
    risk_rationale: LOW-risk path remains valid.


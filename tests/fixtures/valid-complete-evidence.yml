workflow:
  id: valid-complete-evidence
  type: feature

context:
  workflow_file: workflows/examples/valid-complete-evidence.yml
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: completed
    - phase: qa
      state: completed

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
      - validation
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow change.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: No blocking review findings remain.
    residual_risk: bounded residual documentation risk only
  qa:
    outcome: passed
    evidence_summary: Validation commands passed with expected output.
    unresolved_risks:
      - none

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock reporting endpoint scope before coding.
    acceptance_criteria:
      - reporting endpoint remains bounded
      - validation stays inside workflow scope
    approved_scope:
      - reporting endpoint
      - validation
    non_goals:
      - no contract changes
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Scope and risk are stable for implementation.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture check kept the change inside current module boundaries.
    approved_scope:
      - reporting endpoint
      - validation
    module_boundaries:
      - runtime layer
    contract_impact: No contract changes required.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - preserve module boundaries
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Implemented the bounded reporting endpoint and validation updates.
    changed_files:
      - policyflow/validator.py
      - tests/test_validator.py
    test_summary: Validator and workflow tests passed for the implementation slice.
    docs_updates:
      - README.md
    known_limitations:
      - no GitHub API integration
    unresolved_questions:
      - none
  review:
    owner_agent: review-agent
    review_findings:
      - no blocking findings remain
    required_fixes:
      - none
    severity: none
    approval_status: approved
    review_approval: Review approved for QA handoff.
    residual_risk: bounded residual documentation risk only
    qa_focus_areas:
      - validator regression coverage
    test_expectations:
      - validator tests remain green
  qa:
    owner_agent: qa-agent
    qa_report: QA evidence confirmed validator and workflow checks pass.
    quality_gate_status: passed
    unresolved_risks:
      - none
    approval_required: false
    merge_readiness: true


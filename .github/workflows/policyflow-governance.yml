name: PolicyFlow Governance

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/policyflow-governance.yml"
      - "github/PULL_REQUEST_TEMPLATE.md"
      - "github/ISSUE_TEMPLATE/*.yml"
      - "policyflow/**/*.py"
      - "tests/**/*.py"
      - "tests/fixtures/*.yml"
      - "tests/fixtures/*.md"
      - "workflows/**/*.yml"
      - "README.md"
      - "docs/**/*.md"
      - "policyflow.runners.yml"
      - "pyproject.toml"

jobs:
  validate-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PolicyFlow
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PolicyFlow
        run: python -m pip install -e .[dev]

      - name: Run validator test suite
        run: pytest -q tests/test_pr_validator.py tests/test_validator.py tests/test_runtime_cli.py tests/test_github_approval.py

      - name: Validate published workflow examples and features
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(workflows/examples/*.yml workflows/features/*.yml)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No workflow examples or features found."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Validating ${file}"
            policyflow validate "${file}"
          done

      - name: Fetch live PR body
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .body > pr-body.md

      - name: Fetch PR reviews
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" > pr-reviews.json

      - name: Validate PR body governance
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python - <<'PY' > workflow-path.txt
          from pathlib import Path
          import re
          import sys

          text = Path("pr-body.md").read_text(encoding="utf-8")
          current_section = None

          for line in text.splitlines():
              if line.startswith("## "):
                  current_section = line[3:].strip()
                  continue

              if current_section != "Workflow File":
                  continue

              cleaned = re.sub(r"^-+\s*", "", line.strip()).strip("` ")
              if cleaned:
                  print(cleaned)
                  break
          else:
              sys.stderr.write("Workflow File entry not found in PR body.\n")
              raise SystemExit(1)
          PY

          workflow_path=$(cat workflow-path.txt)

          if [ ! -f "$workflow_path" ]; then
            echo "Workflow file from PR body not found: $workflow_path"
            exit 1
          fi

          policyflow validate-pr "$workflow_path" pr-body.md
          policyflow validate-github-approvals "$workflow_path" pr-body.md pr-reviews.json

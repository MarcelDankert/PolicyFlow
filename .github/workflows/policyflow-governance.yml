name: PolicyFlow Governance

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
  pull_request:
  pull_request_review:
    types: [submitted, dismissed]
  push:
    branches:
      - main
    paths:
      - ".github/workflows/policyflow-governance.yml"
      - "github/PULL_REQUEST_TEMPLATE.md"
      - "github/ISSUE_TEMPLATE/*.yml"
      - "policyflow/**/*.py"
      - "tests/**/*.py"
      - "tests/fixtures/*.yml"
      - "tests/fixtures/*.md"
      - "workflows/**/*.yml"
      - "README.md"
      - "docs/**/*.md"
      - "policyflow.runners.yml"
      - "pyproject.toml"

jobs:
  validate-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PolicyFlow
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PolicyFlow
        run: python -m pip install -e .[dev]

      - name: Run validator test suite
        run: pytest -q tests/test_pr_validator.py tests/test_validator.py tests/test_runtime_cli.py tests/test_github_approval.py

      - name: Validate published workflow examples and features
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(workflows/examples/*.yml workflows/features/*.yml)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No workflow examples or features found."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Validating ${file}"
            policyflow validate "${file}"
          done

      - name: Resolve PR number
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        shell: bash
        env:
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PULL_REQUEST_URL: ${{ github.event.review.pull_request_url }}
        run: |
          if [ -n "${PULL_REQUEST_NUMBER}" ]; then
            echo "PR_NUMBER=${PULL_REQUEST_NUMBER}" >> "$GITHUB_ENV"
          else
            echo "PR_NUMBER=${REVIEW_PULL_REQUEST_URL##*/}" >> "$GITHUB_ENV"
          fi

      - name: Fetch live PR body
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .body > pr-body.md

      - name: Fetch PR reviews
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" > pr-reviews.json

      - name: Validate PR body governance
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        shell: bash
        run: |
          python - <<'PY' > workflow-path.txt
          from pathlib import Path
          import re
          import sys

          text = Path("pr-body.md").read_text(encoding="utf-8")
          current_section = None
          headings = []
          workflow_file_lines = []
          workflow_file_section_present = False

          for line in text.splitlines():
              if line.startswith("## "):
                  current_section = line[3:].strip()
                  headings.append(current_section)
                  if current_section == "Workflow File":
                      workflow_file_section_present = True
                  continue

              if current_section == "Workflow File":
                  workflow_file_lines.append(line)

          for line in workflow_file_lines:
              cleaned = re.sub(r"^-+\s*", "", line.strip()).strip("` ")
              if cleaned:
                  print(cleaned)
                  break
          else:
              if workflow_file_section_present:
                  message = "PR body Workflow File section is empty."
              else:
                  message = "PR body must include a Workflow File section."
              headings_text = ", ".join(headings) if headings else "none"
              sys.stderr.write(
                  f"{message} PR body length: {len(text)} characters. "
                  f"Markdown headings found: {headings_text}.\n"
              )
              raise SystemExit(1)
          PY

          workflow_path=$(cat workflow-path.txt)

          if [ ! -f "$workflow_path" ]; then
            echo "Workflow file from PR body not found: $workflow_path"
            exit 1
          fi

          policyflow validate-pr "$workflow_path" pr-body.md
          policyflow validate-github-approvals "$workflow_path" pr-body.md pr-reviews.json

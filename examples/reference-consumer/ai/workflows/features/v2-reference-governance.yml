workflow:
  id: v2-reference-governance
  name: V2 Reference Governance
  version: 1
  type: feature
  status: active
  description: Reference Consumer-Repo workflow demonstrating v2 governance.

context:
  workflow_file: ai/workflows/features/v2-reference-governance.yml
  issue_key: "#REF-1"
  goal: Demonstrate PolicyFlow v2 governance in a provider-neutral Consumer-Repo path.
  scope:
    - workflow validation
    - loop governance declaration
    - evaluation governance declaration
    - audit reporting
  non_goals:
    - no hosted runtime
    - no provider credentials
    - no provider SDK coupling
    - no workflow engine or scheduler behavior
  affected_modules:
    - ai/workflows/features/v2-reference-governance.yml
  risk_level: MEDIUM
  confidence:
    planning: Reference scope and non-goals are fixed before implementation.
    implementation: The example is static and provider-neutral.
    tests: PolicyFlow validation, audit, evaluation-report, and loop-report cover this path.
    residual_uncertainty: Consumer-specific overlays remain the responsibility of adopting repos.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none
  approval_evidence:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Reference Consumer-Repo scope and non-goals were locked before implementation.
    scope_locked:
      - workflow validation
      - loop governance
      - evaluation governance
      - audit reporting
    non_goals_locked:
      - no hosted runtime
      - no provider credentials
      - no provider SDK coupling
    risk_rationale: MEDIUM risk because the example demonstrates the full governance path without protected-area changes.
  architecture-check:
    decision: Keep the reference path provider-neutral and evidence-based.
    constraints:
      - external systems produce evidence
      - PolicyFlow validates and reports governance
      - no hosted runtime or provider credentials
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: Reference review evidence demonstrates loop governance without executing the loop.
    residual_risk: Consumer-specific overlays remain outside the reference path.
  qa:
    outcome: passed
    evidence_summary: Reference QA evidence demonstrates evaluation governance.
    unresolved_risks:
      - none
    tests: passed
    coverage: "85"

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Demonstrate PolicyFlow v2 governance in a reference Consumer-Repo.
    acceptance_criteria:
      - workflow validates
      - loop governance is declared
      - evaluation governance is declared
      - audit reporting can read the workflow
    approved_scope:
      - reference workflow validation
      - reference loop governance
      - reference evaluation governance
      - reference audit reporting
    non_goals:
      - no hosted runtime
      - no provider credentials
      - no provider SDK coupling
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Static provider-neutral reference path is ready for Consumer-Repo validation.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Reference path keeps execution external and makes evidence visible to PolicyFlow.
    approved_scope:
      - reference Consumer-Repo workflow
      - loop governance declaration
      - evaluation governance declaration
    module_boundaries:
      - Consumer-Repo owns execution
      - PolicyFlow owns validation and reporting
    contract_impact: No runtime or provider contract impact.
    risk_review_decision: MEDIUM risk reference path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - no hosted runtime
      - no provider credentials
      - no provider SDK coupling

evaluation:
  compliance_status: passed
  categories:
    - id: tests
      required_metrics:
        - id: tests-passed
          name: Test suite pass status
          category: tests
          source: ci
          required: true
          thresholds:
            operator: equals
            value: passed
          actual_value: passed
          status: passed
          evidence_refs:
            - evidence.qa
          blocks_merge: true
    - id: coverage
      required_metrics:
        - id: line-coverage
          name: Line coverage percentage
          category: coverage
          source: ci
          required: false
          thresholds:
            operator: greater_than_or_equal
            value: "80"
          actual_value: "85"
          status: passed
          evidence_refs:
            - evidence.qa
          blocks_merge: false

loop_governance:
  loops:
    - id: review-feedback
      source_phase: review
      target_phase: implementation
      allowed_feedback_sources:
        - review-findings
        - qa-findings
      max_iterations: 3
      current_iteration: 1
      status: active
      stop_conditions:
        - id: review-findings-resolved
          description: Blocking review findings are resolved.
      escalation_conditions:
        - id: iteration-limit-reached
          trigger: max_iterations_exceeded
          escalate_to: human-arbitration
      evidence_refs:
        - evidence.review

overrides: []

runtime:
  status: idle
  current_phase:
  active_agent:
  last_transition:
  block_reason:

handoffs: []

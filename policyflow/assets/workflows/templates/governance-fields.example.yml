context:
  workflow_file: workflows/examples/example-feature-workflow.yml
  risk_level: MEDIUM
  confidence:
    planning: Scope and risk are stable enough for architecture review.
    implementation: Implementation is bounded by the declared module constraints.
    tests: Direct workflow validation and focused regression checks are planned.
    residual_uncertainty: Review must confirm no hidden contract impact.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: no
  escalation_required: no
  protected_areas_touched:
    - none
  approval_evidence:
    - none required for current classification

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
      - phase: review
        state: pending
      - phase: qa
        state: pending

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow update.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review

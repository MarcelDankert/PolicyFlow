governance:
  workflow_file: workflows/examples/example-feature-workflow.yml
  risk_level: MEDIUM
  confidence:
    overall: 0.85
    implementation: 0.86
    architecture_alignment: 0.88
    test_completeness: 0.80
    contract_safety: 0.85
    rationale: bounded cross-module change with direct validation evidence
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: no
  escalation_required: no
  protected_areas_touched:
    - none
  approval_evidence:
    - none required for current classification

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
      - phase: review
        state: pending
      - phase: qa
        state: pending

evidence:
  planning:
    summary: Scope and risk were locked before implementation.
    scope_locked:
      - reporting endpoint
    non_goals_locked:
      - no contract changes
    risk_rationale: Bounded MEDIUM-risk workflow update.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - preserve module boundaries
    approval_path: architecture-agent review

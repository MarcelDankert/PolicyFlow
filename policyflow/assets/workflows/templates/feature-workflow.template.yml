workflow:
  id: feature-workflow-template
  name: Feature Workflow
  version: 1
  type: feature
  status: template
  # Required default for all PolicyFlow consumer repos:
  # 1. Create this workflow before implementation.
  # 2. Fix scope, non_goals, and risk before writing code.
  # 3. Execute these workflow phases as real working steps.
  # 4. Use this workflow to steer execution, not only to document it afterwards.
  # Allowed: small same-scope clarifications in the same PR.
  # Not allowed: silent scope, risk, or non_goals expansion.

context:
  workflow_file: workflows/templates/feature-workflow.template.yml
  required_fields:
    - goal
    - scope
    - non_goals
    - affected_modules
    - workflow_file
    - risk_level
    - confidence
    - required_reviews
    - human_approval_required
    - protected_areas_touched
    - approval_evidence

execution:
  mode: strict
  phases:
    - phase: planning
      state: pending
    - phase: architecture-check
      state: pending
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence: {}
# Add machine-readable evidence blocks as phases complete, for example:
# evidence:
#   planning:
#     summary: Scope and risk were locked before implementation.
#     scope_locked:
#       - reporting endpoint
#     non_goals_locked:
#       - no contract changes
#     risk_rationale: Bounded MEDIUM-risk change.

contracts: {}
# Add machine-readable role contracts as phases complete, for example:
# contracts:
#   planning:
#     owner_agent: planning-agent
#     issue_brief: Lock scope before implementation.
#     acceptance_criteria:
#       - reporting endpoint stays in scope
#     approved_scope:
#       - reporting endpoint
#     non_goals:
#       - no contract changes
#     initial_risk_level: MEDIUM
#     protected_areas_touched:
#       - none
#     confidence_summary: Scope and risk are stable for implementation.
#     escalation_flags:
#       - none
# Completed phases must have the matching contract block with the expected owner agent.

overrides: []
# Add typed override blocks only for explicit, approved exceptions, for example:
# overrides:
#   - id: phase-bypass-1
#     type: phase_bypass
#     reason: Review starts with a bounded overlap for this slice.
#     scope_impact: No scope expansion beyond parser validation.
#     risk_impact: MEDIUM risk remains unchanged because compensating controls are explicit.
#     mitigations:
#       - review findings must be resolved before QA completion
#     approved_by: architecture-agent
#     approval_reference: ARCH-OVERRIDE-1
#     review_by: 2026-06-30
#     bypassed_phase: review
#     compensating_controls:
#       - review findings tracked in the PR before QA sign-off
# Overrides become `expiring` within 7 days of review_by/expires_on and
# `revalidation_required` once that date has passed.
# Supported types:
# - scope_exception
# - risk_exception
# - phase_bypass
# - approval_bypass
# - non_goal_exception

runtime:
  status: idle
  current_phase:
  active_agent:
  last_transition:
  block_reason:

handoffs: []
# Record concrete handoffs as the workflow advances, for example:
# handoffs:
#   - from_phase: architecture-check
#     to_phase: implementation
#     status: pending
#     required_inputs:
#       - architecture_assessment
#       - implementation_constraints
#     produced_outputs:
#       - implementation_summary
#       - test_summary
#     blockers: []
#     override_refs: []
# Runtime orchestration commands may mutate these fields directly:
# - policyflow start-phase
# - policyflow complete-phase
# - policyflow block-phase
# - policyflow record-handoff

steps:
  - step: plan
    agent: planning-agent
    purpose: lock scope, non_goals, and risk before implementation starts
    input_artifacts:
      - approved issue
    output_artifacts:
      - issue_brief
      - acceptance_criteria
      - approved_scope
      - non_goals
      - initial_risk_level
      - protected_areas_touched
      - confidence_summary
      - escalation_flags
    handoff_to: architecture-agent
    handoff_conditions:
      - risk is declared
      - workflow_file is declared
      - scope and non_goals are declared before implementation
    stop_conditions:
      - scope ambiguous
    escalation_conditions:
      - risk unclear
  - step: architecture-check
    agent: architecture-agent
    purpose: make the risk-based architecture decision explicit before coding
    input_artifacts:
      - issue_brief
      - acceptance_criteria
      - non_goals
      - initial_risk_level
      - protected_areas_touched
      - confidence_summary
      - escalation_flags
    output_artifacts:
      - architecture_assessment
      - approved_scope
      - module_boundaries
      - contract_impact
      - risk_review_decision
      - required_reviews
      - implementation_constraints
    handoff_to: senior-dev-agent
    handoff_conditions:
      - review depth matches risk
    stop_conditions:
      - boundary conflict
    escalation_conditions:
      - approval path required
  - step: implement
    agent: senior-dev-agent
    purpose: implement only after planning and architecture constraints are explicit
    input_artifacts:
      - architecture_assessment
      - approved_scope
      - module_boundaries
      - contract_impact
      - risk_review_decision
      - required_reviews
      - implementation_constraints
    output_artifacts:
      - implementation_summary
      - changed_files
      - test_summary
      - docs_updates
      - known_limitations
      - unresolved_questions
    handoff_to: review-agent
    handoff_conditions:
      - scope unchanged
    stop_conditions:
      - protected-area drift
    escalation_conditions:
      - runtime or data impact uncertain
  - step: review
    agent: review-agent
    purpose: perform an explicit review phase before QA and merge readiness
    input_artifacts:
      - implementation_summary
      - changed_files
      - test_summary
      - docs_updates
      - known_limitations
      - unresolved_questions
    output_artifacts:
      - review_findings
      - required_fixes
      - severity
      - approval_status
      - review_approval
      - residual_risk
      - qa_focus_areas
      - test_expectations
    handoff_to: senior-dev-agent or qa-agent
    handoff_conditions:
      - no blocking findings before QA
    stop_conditions:
      - validation missing
    escalation_conditions:
      - risk understated
  - step: qa
    agent: qa-agent
    purpose: perform an explicit QA evidence pass before merge readiness
    input_artifacts:
      - review_approval
      - residual_risk
      - qa_focus_areas
      - test_expectations
    output_artifacts:
      - qa_report
      - quality_gate_status
      - unresolved_risks
      - approval_required
      - merge_readiness
    handoff_to: human approval or merge readiness
    handoff_conditions:
      - evidence present
    stop_conditions:
      - acceptance criteria not evidenced
    escalation_conditions:
      - approval unresolved

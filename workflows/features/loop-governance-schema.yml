workflow:
  id: loop-governance-schema
  name: Loop Governance Schema
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Define the declarative Loop Governance schema without introducing loop execution.

context:
  workflow_file: workflows/features/loop-governance-schema.yml
  issue_key: "#73"
  goal: Define Loop Governance as an optional declarative workflow block covering source and target phases, feedback sources, iteration limits, stop conditions, escalation conditions, and evidence.
  scope:
    - schema compatibility documentation for Loop Governance
    - roadmap wording for Loop Governance schema boundaries
    - workflow template skeletons for loop governance
    - packaged schema docs and packaged template copies
    - repository docs tests for the schema contract
  non_goals:
    - no typed loop model
    - no validator behavior changes
    - no loop execution, scheduling, message routing, or memory
    - no provider-specific agent runtime integration
  affected_modules:
    - docs/roadmap-agentic-governance.md
    - docs/schema-compatibility.md
    - policyflow/assets/docs/schema-compatibility.md
    - workflows/templates
    - policyflow/assets/workflows/templates
    - tests/test_repository_docs.py
    - workflows/features
  risk_level: MEDIUM
  confidence:
    planning: Scope follows issue #73 and ADR-0003, with runtime ownership explicitly excluded.
    implementation: Changes are limited to docs, templates, packaged copies, and docs tests.
    tests: Repository docs tests and workflow validation will cover the schema definition.
    residual_uncertainty: Later model and validator issues may refine names before v1.x stabilization.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa

workflow:
  id: workflow-confidence-requirement
  type: feature

context:
  workflow_file: workflows/features/workflow-confidence-requirement.yml
  goal: Require workflow confidence in the validator and templates.
  scope:
    - require context.confidence in workflow validation
    - define the minimum confidence fields in the workflow model
    - normalize confidence through context and root fallback handling
    - update templates, bootstrap starter workflow, docs, and PR template language
    - add validator and PR validation tests for confidence requirements
  non_goals:
    - no redesign of the broader risk model
    - no new scoring engine or confidence automation
    - no confidence-based authorization bypass
  affected_modules:
    - policyflow/models.py
    - policyflow/schemas.py
    - policyflow/validator.py
    - policyflow/bootstrap.py
    - workflows
    - github
    - docs
    - tests
  risk_level: MEDIUM
  confidence:
    planning: Scope and non-goals are fixed to making confidence explicit without changing risk scoring.
    implementation: Implementation is bounded to schema, validator, template, bootstrap, and documentation updates.
    tests: Focused validator, PR, and bootstrap tests cover missing, malformed, and generated confidence behavior.
    residual_uncertainty: Consumer-specific confidence wording still depends on project context and must be reviewed in each workflow.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and non-goals were locked before making confidence a required workflow field.
    scope_locked:
      - require context.confidence in workflow validation
      - define minimum confidence fields in the workflow model
      - normalize confidence through context and root fallback handling
      - update templates, bootstrap starter workflow, docs, and PR template language
      - add validator and PR validation tests for confidence requirements
    non_goals_locked:
      - no redesign of the broader risk model
      - no new scoring engine or confidence automation
      - no confidence-based authorization bypass
    risk_rationale: MEDIUM risk because the validator now rejects workflows that omit the confidence contract.
  architecture-check:
    decision: Model confidence as a required context mapping with planning, implementation, tests, and residual_uncertainty text fields.
    constraints:
      - confidence must be explicit before implementation starts
      - PR Confidence summary must summarize workflow confidence rather than create a separate source of truth
      - root fallback normalization must remain explicit for legacy-compatible fixtures
      - no numeric scoring engine is introduced
    approval_path: architecture-agent review
  implementation:
    summary: Workflow confidence is now required by schema and validator, generated by bootstrap, shown in templates, and referenced by PR validation and docs.
    changed_files:
      - policyflow/models.py
      - policyflow/schemas.py
      - policyflow/validator.py
      - policyflow/bootstrap.py
      - workflows/templates/
      - policyflow/assets/workflows/templates/
      - github/PULL_REQUEST_TEMPLATE.md
      - policyflow/assets/github/PULL_REQUEST_TEMPLATE.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - README.md
      - tests/test_validator.py
      - tests/test_pr_validator.py
      - tests/test_bootstrap.py
      - tests/fixtures/
      - workflows/features/workflow-confidence-requirement.yml
    test_summary: Focused tests cover missing confidence, malformed confidence, PR bodies without confidence summary, model hydration, and bootstrap starter confidence output.
    docs_updates:
      - getting started documents the required context.confidence shape
      - README lists context.confidence as a validator requirement
      - PR template maps Confidence summary back to context.confidence
    known_limitations:
      - confidence remains human-authored text
      - confidence cannot bypass review, QA, escalation, or approval requirements
    unresolved_questions: []

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Make workflow confidence a hard PolicyFlow requirement.
    acceptance_criteria:
      - workflows that omit context.confidence fail validation with a clear message
      - valid low, medium, and high examples include confidence data
      - templates show the minimum confidence block a consumer must fill in
      - PR governance docs explain how the confidence summary maps back to workflow confidence
      - bootstrap-generated starter workflows include the required confidence shape
    approved_scope:
      - require context.confidence in workflow validation
      - define minimum confidence fields in the workflow model
      - normalize confidence through context and root fallback handling
      - update templates, bootstrap starter workflow, docs, and PR template language
      - add validator and PR validation tests for confidence requirements
    non_goals:
      - no redesign of the broader risk model
      - no new scoring engine or confidence automation
      - no confidence-based authorization bypass
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium confidence; the validator behavior is covered by focused tests and existing workflow validation.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Required context confidence is a schema contract, not a scoring system, and keeps confidence visible during planning.
    approved_scope:
      - require context.confidence in workflow validation
      - define minimum confidence fields in the workflow model
      - normalize confidence through context and root fallback handling
      - update templates, bootstrap starter workflow, docs, and PR template language
      - add validator and PR validation tests for confidence requirements
    module_boundaries:
      - policyflow.models owns the typed confidence schema
      - policyflow.schemas owns context and root fallback normalization
      - policyflow.validator owns mandatory field and PR summary checks
      - policyflow.bootstrap owns generated starter confidence data
    contract_impact: Workflows now require context.confidence with planning, implementation, tests, and residual_uncertainty fields.
    risk_review_decision: MEDIUM risk path approved because validator strictness changes existing workflow acceptance.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - do not introduce numeric scoring
      - do not let confidence bypass governance requirements
      - update packaged assets when source templates or docs change
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Added required workflow confidence schema, validator checks, PR summary validation, bootstrap output, template examples, and documentation.
    changed_files:
      - policyflow/models.py
      - policyflow/schemas.py
      - policyflow/validator.py
      - policyflow/bootstrap.py
      - workflows/templates/
      - policyflow/assets/workflows/templates/
      - github/PULL_REQUEST_TEMPLATE.md
      - policyflow/assets/github/PULL_REQUEST_TEMPLATE.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - README.md
      - tests/test_validator.py
      - tests/test_pr_validator.py
      - tests/test_bootstrap.py
      - tests/fixtures/
      - workflows/features/workflow-confidence-requirement.yml
    test_summary: Focused tests cover missing confidence, malformed confidence, PR bodies without confidence summary, model hydration, and bootstrap starter confidence output.
    docs_updates:
      - getting started documents the required context.confidence shape
      - README lists context.confidence as a validator requirement
      - PR template maps Confidence summary back to context.confidence
    known_limitations:
      - confidence remains human-authored text
      - confidence cannot bypass review, QA, escalation, or approval requirements
    unresolved_questions: []

overrides: []

runtime:
  status: handoff_pending
  current_phase: implementation
  active_agent: review-agent
  last_transition: implementation completed and ready for review
  block_reason:

handoffs:
  - from_phase: implementation
    to_phase: review
    status: pending
    required_inputs:
      - implementation_summary
      - changed_files
      - test_summary
      - docs_updates
    produced_outputs:
      - review_findings
      - residual_risk
    blockers: []
    override_refs: []

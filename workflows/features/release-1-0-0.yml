workflow:
  id: release-1-0-0
  name: Release 1.0.0
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Prepare the PolicyFlow 1.0.0 Agentic Governance Platform release.

context:
  workflow_file: workflows/features/release-1-0-0.yml
  issue_key: "v2.0 milestone release"
  goal: Prepare version, release notes, docs pins, packaged asset pins, and release validation for PolicyFlow 1.0.0.
  scope:
    - package version bump to 1.0.0
    - README, getting-started, release-and-upgrade, and packaged docs release pins
    - packaged GitHub governance workflow pin
    - changelog release notes for the Agentic Governance Platform baseline
    - release packaging and full test validation
  non_goals:
    - no new runtime, validation, schema, or provider behavior beyond already merged milestone work
    - no removal of 0.x compatibility fallback behavior
    - no publishing before PR review and merge
    - no release orchestration automation
  affected_modules:
    - pyproject.toml
    - policyflow/__init__.py
    - policyflow/bootstrap.py
    - README.md
    - CHANGELOG.md
    - docs/getting-started.md
    - docs/release-and-upgrade.md
    - github/workflows/policyflow-governance.yml
    - examples/reference-consumer/ai/project-context.yml
    - tests/fixtures/valid-medium.yml
    - workflows/examples/example-feature-workflow.yml
    - workflows/features/runtime-agent-orchestration.yml
    - workflows/features/schema-normalization-and-override-lifecycle.yml
    - workflows/features/typed-exception-and-override-handling.yml
    - workflows/templates/feature-workflow.template.yml
    - policyflow/assets/docs/getting-started.md
    - policyflow/assets/docs/release-and-upgrade.md
    - policyflow/assets/github/workflows/policyflow-governance.yml
    - policyflow/assets/workflows/templates/feature-workflow.template.yml
    - tests/test_bootstrap.py
    - tests/test_repository_docs.py
    - workflows/features/release-1-0-0.yml
  risk_level: HIGH
  confidence:
    planning: The v2.0 Agentic Governance Platform milestone has no open issues or PRs, and release scope is metadata, docs, managed asset pins, and validation.
    implementation: Version and release pin changes are mechanical, but the release is consumer-facing and marks the first stable baseline.
    tests: Release packaging tests, full pytest suite, package build, artifact inspection, and workflow validation will validate the release prep.
    residual_uncertainty: Actual PyPI and GitHub Release publication remains a separate post-merge release operation.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
    - human approval
  human_approval_required: true
  escalation_required: true
  protected_areas_touched:
    - release compatibility
    - publication artifacts
    - consumer-facing documentation
  approval_evidence:
    - evidence.approval

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress
    - phase: qa
      state: pending
    - phase: approval
      state: pending

evidence:
  planning:
    summary: Release preparation scope was locked after completing the v2.0 Agentic Governance Platform milestone.
    scope_locked:
      - version bump to 1.0.0
      - release notes
      - docs and managed asset pins
      - release validation
    non_goals_locked:
      - no release publication before merge
      - no new feature behavior
      - no 0.x fallback removal
      - no release orchestration automation
    risk_rationale: HIGH risk because 1.0.0 establishes the first stable consumer-facing release baseline and changes publication artifacts.
  architecture-check:
    decision: Prepare 1.0.0 as the stable Agentic Governance Platform baseline without removing existing 0.x compatibility behavior.
    constraints:
      - version metadata and docs pins must align
      - managed asset pins must align
      - changelog must state compatibility and upgrade expectations
      - release publication remains post-merge
    approval_path: architecture-agent, review-agent, qa-agent, and human approval
  implementation:
    summary: Prepared PolicyFlow 1.0.0 release metadata, release notes, documentation pins, managed asset pins, reference-consumer pin, and deterministic release validation fixtures.
    changed_files:
      - pyproject.toml
      - policyflow/__init__.py
      - policyflow/bootstrap.py
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
      - github/workflows/policyflow-governance.yml
      - examples/reference-consumer/ai/project-context.yml
      - tests/fixtures/valid-medium.yml
      - workflows/examples/example-feature-workflow.yml
      - workflows/features/runtime-agent-orchestration.yml
      - workflows/features/schema-normalization-and-override-lifecycle.yml
      - workflows/features/typed-exception-and-override-handling.yml
      - workflows/templates/feature-workflow.template.yml
      - policyflow/assets/docs/getting-started.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/github/workflows/policyflow-governance.yml
      - policyflow/assets/workflows/templates/feature-workflow.template.yml
      - tests/test_bootstrap.py
      - tests/test_repository_docs.py
      - workflows/features/release-1-0-0.yml
    validation:
      - command: pytest -q tests/test_repository_docs.py tests/test_bootstrap.py tests/test_release_packaging.py
        result: passed, 47 tests
      - command: python -m build --outdir %TEMP%/policyflow-1.0.0-dist
        result: passed, produced wheel and sdist
      - command: artifact inspection for policyflow-1.0.0 wheel and sdist
        result: passed, version metadata and managed assets present
      - command: pytest -q
        result: passed, 222 tests
      - command: pytest -q tests/test_pr_validator.py tests/test_validator.py tests/test_runtime_cli.py tests/test_github_approval.py
        result: passed, 125 tests
      - command: validate all workflows/examples/*.yml and workflows/features/*.yml
        result: passed
      - command: policyflow validate workflows/features/release-1-0-0.yml
        result: passed
      - command: policyflow validate workflows/examples/example-feature-workflow.yml
        result: passed
      - command: policyflow validate workflows/examples/example-bugfix-workflow.yml
        result: passed
      - command: policyflow validate workflows/examples/example-architecture-change-workflow.yml
        result: passed
      - command: policyflow validate workflows/examples/querypilot-pilot-workflow.yml
        result: passed
      - command: git diff --check
        result: passed with Git CRLF conversion warnings only
    release_artifacts:
      - policyflow-1.0.0-py3-none-any.whl
      - policyflow-1.0.0.tar.gz
    limitations:
      - PyPI publication remains a post-merge release operation.
      - GitHub Release creation remains a post-merge release operation.
  qa:
    outcome: passed
    evidence_summary: Release docs, bootstrap metadata, packaged assets, build artifacts, deterministic override fixtures, and full test coverage were validated locally.
    checks_run:
      - targeted release docs, bootstrap, and packaging tests
      - wheel and sdist build
      - wheel and sdist artifact inspection
      - full pytest suite
      - CI governance test subset
      - all published workflow example and feature validations
      - active workflow validation
      - example workflow validations
      - git diff check
    unresolved_risks:
      - actual PyPI upload and GitHub Release creation remain post-merge
  approval:
    approved_by: MarcelDankert
    reference: PR approval required before merge
    scope_confirmed: true

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Prepare the 1.0.0 release PR after the v2.0 milestone completed.
    acceptance_criteria:
      - package version declares 1.0.0
      - release notes describe the Agentic Governance Platform baseline
      - docs and managed asset pins reference 1.0.0
      - release packaging and full tests pass
      - release notes preserve the 0.x compatibility boundary unless code changes remove it explicitly
    approved_scope:
      - release preparation
      - docs pins
      - managed asset pins
      - release validation
    non_goals:
      - no publication before merge
      - no new feature behavior
      - no 0.x fallback removal
    initial_risk_level: HIGH
    protected_areas_touched:
      - release compatibility
      - publication artifacts
      - consumer-facing documentation
    confidence_summary: Release prep is bounded to metadata, docs, managed asset pins, and validation.
    escalation_flags:
      - human approval required
      - release compatibility touched
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: A 1.0.0 release is appropriate as the first stable consumer-facing governance baseline; it should not imply that PolicyFlow now owns runtime execution or provider behavior.
    approved_scope:
      - version metadata
      - release notes
      - docs pins
      - managed asset pins
      - release validation
    module_boundaries:
      - packaging metadata owns the package version
      - docs own release and upgrade communication
      - packaged assets own Consumer-Repo defaults
      - validator semantics remain unchanged
    contract_impact: Consumer-Repos can pin PolicyFlow 1.0.0 as the stable governance baseline.
    risk_review_decision: HIGH risk path accepted because release artifacts and consumer-facing compatibility guidance are touched.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
      - human approval
    implementation_constraints:
      - no compatibility fallback removal
      - no runtime ownership change
      - no publication before merge
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Updated package version, release pins, changelog, managed assets, reference-consumer metadata, deterministic release validation fixtures, and tests for 1.0.0.
    changed_files:
      - pyproject.toml
      - policyflow/__init__.py
      - policyflow/bootstrap.py
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
      - github/workflows/policyflow-governance.yml
      - examples/reference-consumer/ai/project-context.yml
      - tests/fixtures/valid-medium.yml
      - workflows/examples/example-feature-workflow.yml
      - workflows/features/runtime-agent-orchestration.yml
      - workflows/features/schema-normalization-and-override-lifecycle.yml
      - workflows/features/typed-exception-and-override-handling.yml
      - workflows/templates/feature-workflow.template.yml
      - policyflow/assets/docs/getting-started.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/github/workflows/policyflow-governance.yml
      - policyflow/assets/workflows/templates/feature-workflow.template.yml
      - tests/test_bootstrap.py
      - tests/test_repository_docs.py
      - workflows/features/release-1-0-0.yml
    test_summary: Targeted release docs, bootstrap, and packaging tests passed; the package build produced wheel and sdist artifacts with 1.0.0 metadata; artifact inspection found required managed assets; the full pytest suite, CI governance subset, and all published workflow validations passed.
    docs_updates:
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
      - policyflow/assets/docs/getting-started.md
      - policyflow/assets/docs/release-and-upgrade.md
    known_limitations:
      - release artifacts are not published by this PR
      - GitHub Release creation remains a post-merge release operation
    unresolved_questions:
      - none
  qa:
    owner_agent: qa-agent
    qa_report: Release preparation passed targeted tests, full pytest, CI governance subset, all published workflow validations, build, artifact inspection, managed asset parity, and workflow validation checks.
    quality_gate_status: passed
    approval_required: true
    merge_readiness: true
    validation_coverage:
      - release documentation expectations
      - bootstrap metadata version
      - packaged managed asset inclusion
      - wheel and sdist metadata
      - override fixture determinism
      - feature workflow override review dates
    unresolved_risks:
      - publish and GitHub Release remain external post-merge steps

overrides: []

runtime:
  status: in_progress
  current_phase: review
  active_agent: review-agent
  last_transition: implementation completed

handoffs: []

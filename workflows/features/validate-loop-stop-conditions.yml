workflow:
  id: validate-loop-stop-conditions
  name: Validate Loop Stop Conditions
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Require explicit stop conditions for governed loops.

context:
  workflow_file: workflows/features/validate-loop-stop-conditions.yml
  issue_key: "#76"
  goal: Require each governed loop to declare stop conditions and require completed or terminated loop evidence to reference a declared stop condition.
  scope:
    - loop stop_conditions declaration validation
    - completed and terminated loop stop-condition evidence validation
    - clear validator error messages for missing stop conditions
    - validator tests
  non_goals:
    - no loop execution
    - no scheduler, message routing, memory, or provider runtime integration
    - no escalation rule validation
    - no new loop schema fields
  affected_modules:
    - policyflow/validator.py
    - tests/test_validator.py
    - workflows/features
  risk_level: MEDIUM
  confidence:
    planning: Scope follows issue #76 and builds on the merged Loop Governance model and max_iterations validation.
    implementation: Validation can reuse existing loop_governance metadata without adding runtime behavior.
    tests: Payload-based tests will cover missing stop conditions, missing completion evidence, and the accepted reference format.
    residual_uncertainty: Escalation-rule semantics remain deferred to issue #77.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Loop stop_conditions validation scope and non-goals were locked before implementation.
    scope_locked:
      - non-empty stop_conditions validation
      - completed and terminated stop-condition evidence validation
      - no new schema fields
    non_goals_locked:
      - no loop execution
      - no escalation rule validation
      - no scheduler, message routing, or memory
    risk_rationale: MEDIUM risk because validator behavior affects Consumer-Repo workflow acceptance.
  architecture-check:
    decision: Use existing evidence_refs to reference declared stop conditions without adding runtime ownership or new schema fields.
    constraints:
      - no loop execution ownership
      - no provider SDK or credential coupling
      - no escalation validation in this change
    approval_path: architecture-agent review
  implementation:
    summary: Added stop_conditions declaration validation and completed or terminated loop stop-condition evidence validation using existing evidence_refs.
    changed_files:
      - policyflow/validator.py
      - tests/test_validator.py
      - tests/fixtures/loop-governance-missing-stop-conditions.yml
    test_summary: Targeted loop governance tests, full validator tests, full pytest suite, active workflow validation, and standard example workflow validation passed.
    docs_updates:
      - none
    known_limitations:
      - escalation rule validation remains deferred
      - docs and examples remain deferred to later milestone issues
    unresolved_questions:
      - none

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Require explicit stop conditions for governed loops.
    acceptance_criteria:
      - each loop declares non-empty stop conditions
      - completed or terminated loop evidence references at least one stop condition
      - missing stop conditions produce clear validator errors
    approved_scope:
      - validator checks
      - tests
    non_goals:
      - no loop execution
      - no escalation rule validation
      - no new schema fields
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Validation scope is bounded to existing Loop Governance metadata fields.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Stop-condition validation remains declarative governance and does not create runtime loop execution responsibilities.
    approved_scope:
      - validator checks
      - tests
    module_boundaries:
      - policyflow validator
      - validator tests
      - active workflow evidence
    contract_impact: Tightens optional Loop Governance validation when loop_governance is declared.
    risk_review_decision: MEDIUM risk remains appropriate.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - reuse evidence_refs for stop-condition references
      - do not validate escalation semantics
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Validator now rejects loops without non-empty stop_conditions and requires completed or terminated loops to reference a declared stop condition in evidence_refs.
    changed_files:
      - policyflow/validator.py
      - tests/test_validator.py
      - tests/fixtures/loop-governance-missing-stop-conditions.yml
    test_summary: Targeted loop governance tests, full validator tests, full pytest suite, active workflow validation, and standard example workflow validation pass.
    docs_updates:
      - none
    known_limitations:
      - issue #77 owns escalation rule validation
      - issues #78 and #79 own examples and documentation
    unresolved_questions:
      - none

overrides: []

runtime:
  status: in_progress
  current_phase: review
  active_agent: review-agent
  last_transition: implementation completed

handoffs: []

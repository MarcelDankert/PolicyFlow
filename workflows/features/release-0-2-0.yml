workflow:
  id: release-0-2-0
  name: Release 0.2.0
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Prepare the PolicyFlow 0.2.0 Evaluation Governance Foundation release.

context:
  workflow_file: workflows/features/release-0-2-0.yml
  issue_key: "v1.1 milestone release"
  goal: Prepare version, release notes, docs pins, packaged asset pins, and release validation for PolicyFlow 0.2.0.
  scope:
    - package version bump to 0.2.0
    - README, getting-started, release-and-upgrade, and packaged docs release pins
    - packaged GitHub governance workflow pin
    - changelog release notes for Evaluation Governance Foundation
    - release packaging and full test validation
  non_goals:
    - no new Evaluation Governance behavior beyond already merged v1.1 work
    - no publishing before PR review and merge
    - no release orchestration automation
  affected_modules:
    - pyproject.toml
    - policyflow/__init__.py
    - policyflow/bootstrap.py
    - README.md
    - CHANGELOG.md
    - docs
    - policyflow/assets
    - tests
  risk_level: LOW
  confidence:
    planning: v1.1 milestone issues are closed and the release scope is version and documentation preparation.
    implementation: Version and release pin changes are mechanical and covered by repository docs, packaging, and full tests.
    tests: Release packaging tests and full pytest suite will validate the release prep.
    residual_uncertainty: Actual PyPI and GitHub Release publication remains a separate post-merge release operation.

governance:
  required_reviews:
    - review-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending

evidence:
  planning:
    summary: Release preparation scope was locked after completing the v1.1 Evaluation Foundation milestone.
    scope_locked:
      - version bump
      - release notes
      - docs and managed asset pins
      - release validation
    non_goals_locked:
      - no release publication before merge
      - no new feature behavior
      - no release orchestration automation
    risk_rationale: LOW risk release preparation for already merged milestone work.
  implementation:
    summary: Prepared 0.2.0 release metadata, version pins, release notes, managed asset pins, and release validation.
    changed_files:
      - pyproject.toml
      - policyflow/__init__.py
      - policyflow/bootstrap.py
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
      - github/workflows/policyflow-governance.yml
      - policyflow/assets/docs/getting-started.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/github/workflows/policyflow-governance.yml
      - tests/test_bootstrap.py
      - tests/test_repository_docs.py
      - workflows/features/release-0-2-0.yml
    test_summary: Targeted release docs, bootstrap, packaging tests, full pytest suite, explicit python -m build, and active workflow validation passed.
    docs_updates:
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
    known_limitations:
      - PyPI and GitHub Release publication remain post-merge release operations
    unresolved_questions:
      - none for release preparation

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Prepare the 0.2.0 release PR after the v1.1 milestone completed.
    acceptance_criteria:
      - package version declares 0.2.0
      - release notes describe Evaluation Governance Foundation
      - docs and managed asset pins reference 0.2.0
      - release packaging and full tests pass
    approved_scope:
      - release preparation
      - docs pins
      - release validation
    non_goals:
      - no publication before merge
      - no new feature behavior
    initial_risk_level: LOW
    protected_areas_touched:
      - none
    confidence_summary: Release prep is bounded to metadata, docs, managed asset pins, and validation.
    escalation_flags:
      - none
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Updated package version, release pins, changelog, managed assets, and tests for 0.2.0.
    changed_files:
      - pyproject.toml
      - policyflow/__init__.py
      - policyflow/bootstrap.py
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
      - github/workflows/policyflow-governance.yml
      - policyflow/assets/docs/getting-started.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/github/workflows/policyflow-governance.yml
      - tests/test_bootstrap.py
      - tests/test_repository_docs.py
      - workflows/features/release-0-2-0.yml
    test_summary: Targeted release docs, bootstrap, packaging tests, full pytest suite, explicit python -m build, and active workflow validation passed.
    docs_updates:
      - README.md
      - CHANGELOG.md
      - docs/getting-started.md
      - docs/release-and-upgrade.md
    known_limitations:
      - release artifacts are not published by this PR
    unresolved_questions:
      - none

overrides: []

runtime:
  status: idle
  current_phase: review
  active_agent: review-agent
  last_transition: implementation completed

handoffs: []

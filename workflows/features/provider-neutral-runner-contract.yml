workflow:
  id: provider-neutral-runner-contract
  type: feature

context:
  workflow_file: workflows/features/provider-neutral-runner-contract.yml
  issue: https://github.com/MarcelDankert/PolicyFlow/issues/43
  goal: Make PolicyFlow runner execution explicitly provider-neutral and document Codex as one reference adapter.
  scope:
    - provider-neutral runner contract documentation
    - command runner example in shipped and bootstrapped runner config
    - Codex reference adapter positioning in docs and examples
    - tests for provider-neutral command runner config and packaged docs/assets
    - README and Getting Started runner guidance updates
  non_goals:
    - no native SDK adapters for additional providers
    - no async runner execution
    - no hosted orchestration service
    - no provider credential management
  affected_modules:
    - policyflow/bootstrap.py
    - policyflow.runners.yml
    - README.md
    - docs
    - policyflow/assets/docs
    - tests
    - workflows/features/provider-neutral-runner-contract.yml
  risk_level: MEDIUM
  confidence:
    planning: Scope is bounded to contract, docs, examples, and config defaults.
    implementation: PolicyFlow already executes generic command runner configs, so the main change is productization clarity.
    tests: Existing runtime tests plus new docs/config tests can verify provider-neutral coverage.
    residual_uncertainty: Provider-specific credential setup remains intentionally outside PolicyFlow.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Issue #43 scope and non-goals were locked before implementation.
    scope_locked:
      - provider-neutral runner contract documentation
      - command runner example in shipped and bootstrapped runner config
      - Codex reference adapter positioning in docs and examples
      - tests for provider-neutral command runner config and packaged docs/assets
      - README and Getting Started runner guidance updates
    non_goals_locked:
      - no native SDK adapters for additional providers
      - no async runner execution
      - no hosted orchestration service
      - no provider credential management
    risk_rationale: MEDIUM risk because runner configuration and docs are consumer-facing contracts, but runtime semantics stay command-based and synchronous.
  architecture-check:
    decision: Keep PolicyFlow core runner execution provider-neutral through the existing command boundary, add an explicit contract document, and demote Codex to reference adapter documentation/config.
    constraints:
      - do not import provider SDKs into PolicyFlow core
      - keep command runner input/output JSON contract stable
      - preserve Codex wrapper as a packaged reference adapter
      - keep bootstrap-generated config actionable and structurally valid
    approval_path: architecture-agent review
  implementation:
    summary: Added a provider-neutral runner contract document, switched shipped and bootstrapped runner config to a command default with Codex as reference adapter, updated runner docs, and added packaging/config tests.
    files_changed:
      - policyflow/bootstrap.py
      - policyflow.runners.yml
      - docs/runner-contract.md
      - policyflow/assets/docs/runner-contract.md
      - README.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - tests/test_bootstrap.py
      - tests/test_doctor.py
      - tests/test_golden_consumer_smoke.py
      - tests/test_release_packaging.py
      - workflows/features/provider-neutral-runner-contract.yml
    tests_run:
      - pytest -q tests/test_bootstrap.py tests/test_doctor.py tests/test_golden_consumer_smoke.py tests/test_runtime_cli.py
      - pytest -q tests/test_release_packaging.py tests/test_repository_docs.py
      - policyflow validate workflows/features/provider-neutral-runner-contract.yml

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Codex is currently the documented runner default even though PolicyFlow core uses a generic command boundary.
    acceptance_criteria:
      - consumers can integrate any command runner by reading one contract document
      - shipped runner config shows a provider-neutral command runner first
      - Codex is documented as a reference adapter, not a PolicyFlow requirement
      - tests cover provider-neutral fake runner execution/config
      - docs and packaged docs assets stay aligned
    approved_scope:
      - provider-neutral runner contract documentation
      - command runner example in shipped and bootstrapped runner config
      - Codex reference adapter positioning in docs and examples
      - tests for provider-neutral command runner config and packaged docs/assets
      - README and Getting Started runner guidance updates
    non_goals:
      - no native SDK adapters for additional providers
      - no async runner execution
      - no hosted orchestration service
      - no provider credential management
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium confidence; runtime execution already supports command runners and tests can verify the contract path.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: The stable boundary should be the command runner contract, with provider adapters implemented outside core or as reference wrappers.
    approved_scope:
      - provider-neutral runner contract documentation
      - command runner example in shipped and bootstrapped runner config
      - Codex reference adapter positioning in docs and examples
      - tests for provider-neutral command runner config and packaged docs/assets
      - README and Getting Started runner guidance updates
    module_boundaries:
      - policyflow.agent_execution owns generic command execution
      - policyflow.codex_runner remains a provider-specific reference wrapper
      - docs own the public runner contract
      - bootstrap owns default Consumer-Repo runner config examples
    contract_impact: Clarifies the public runner contract and updates generated runner config defaults without changing the JSON execution contract shape.
    risk_review_decision: MEDIUM risk accepted with docs/config/runtime tests.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - do not add provider SDK dependencies
      - do not require Codex for PolicyFlow core
      - keep runner failure blocking behavior unchanged
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: "PolicyFlow runner docs and generated configs now lead with a provider-neutral `type: command` runner. Codex remains available through `policyflow.codex_runner` as a reference adapter, and the runner contract is packaged with docs assets."
    changed_files:
      - policyflow/bootstrap.py
      - policyflow.runners.yml
      - docs/runner-contract.md
      - policyflow/assets/docs/runner-contract.md
      - README.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - tests/test_bootstrap.py
      - tests/test_doctor.py
      - tests/test_golden_consumer_smoke.py
      - tests/test_release_packaging.py
      - workflows/features/provider-neutral-runner-contract.yml
    test_summary: Added red-first assertions for neutral bootstrap config and packaged runner contract docs, then verified bootstrap, doctor, golden smoke, runtime, packaging, and repository docs checks.
    docs_updates:
      - docs/runner-contract.md
      - README.md
      - docs/getting-started.md
      - policyflow/assets/docs/runner-contract.md
      - policyflow/assets/docs/getting-started.md
    known_limitations:
      - no additional native provider SDK adapters are introduced
      - provider credentials and auth setup remain outside PolicyFlow
    unresolved_questions:
      - none

overrides: []

runtime:
  status: idle
  current_phase:
  active_agent:
  last_transition: architecture-check completed
  block_reason:

handoffs: []

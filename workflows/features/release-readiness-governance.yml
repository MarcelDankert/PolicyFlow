workflow:
  id: release-readiness-governance
  type: feature

context:
  workflow_file: workflows/features/release-readiness-governance.yml
  issue_key: "#99"
  goal: Model release readiness and blocked or preparatory issue states as explicit governance evidence.
  scope:
    - document a release_readiness artifact shape before implementation
    - cover release blockers, blocked issues, issue ordering, external credentials, non-executable checks, and draft PRs
    - distinguish done, preparatory, blocked, and ready for release states
    - add template guidance and a validating fixture for optional release-readiness evidence
  non_goals:
    - no release orchestration
    - no scheduling behavior
    - no validator requirement for release_readiness
    - no GitHub mutation or provider integration
  affected_modules:
    - docs/release-and-upgrade.md
    - docs/governance-enforcement-roadmap.md
    - policyflow/assets/docs/release-and-upgrade.md
    - policyflow/assets/docs/governance-enforcement-roadmap.md
    - workflows/templates
    - policyflow/assets/workflows/templates
    - tests/fixtures/valid-release-readiness.yml
    - tests/test_repository_docs.py
    - tests/test_validator.py
  risk_level: MEDIUM
  confidence:
    planning: Issue 99 requires a new optional governance evidence shape, but scope is bounded to docs, templates, fixtures, and tests.
    implementation: Implementation can stay declarative without changing validator semantics or runtime behavior.
    tests: Repository docs tests and a validator fixture cover the documented shape and template references.
    residual_uncertainty: Review should confirm the artifact shape is sufficient for Consumer-Repo release planning without implying orchestration ownership.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Issue 99 scope, non-goals, and MEDIUM risk were fixed before implementation.
    scope_locked:
      - release_readiness artifact documentation
      - template guidance
      - validating fixture
      - repository documentation assertions
    non_goals_locked:
      - no release orchestration
      - no scheduling behavior
      - no validator requirement for release_readiness
      - no GitHub mutation or provider integration
    risk_rationale: MEDIUM because the change introduces a new optional governance evidence shape that Consumer-Repos may copy into workflows.
  architecture-check:
    decision: Model release readiness as optional declarative evidence and keep orchestration responsibility outside PolicyFlow.
    constraints:
      - do not add release scheduler or orchestrator behavior
      - do not make release_readiness mandatory
      - keep the artifact compatible with current workflow validation
    approval_path: architecture-agent review
  implementation:
    summary: Added release_readiness evidence guidance, template examples, packaged asset sync, and a validating fixture.
    changed_files:
      - docs/release-and-upgrade.md
      - docs/governance-enforcement-roadmap.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/docs/governance-enforcement-roadmap.md
      - workflows/templates/feature-workflow.template.yml
      - workflows/templates/bugfix-workflow.template.yml
      - workflows/templates/architecture-change-workflow.template.yml
      - workflows/templates/low-risk-workflow.template.yml
      - policyflow/assets/workflows/templates/feature-workflow.template.yml
      - policyflow/assets/workflows/templates/bugfix-workflow.template.yml
      - policyflow/assets/workflows/templates/architecture-change-workflow.template.yml
      - policyflow/assets/workflows/templates/low-risk-workflow.template.yml
      - tests/fixtures/valid-release-readiness.yml
      - tests/test_repository_docs.py
      - tests/test_validator.py
      - workflows/features/release-readiness-governance.yml
    test_summary: Targeted docs and validator tests pass, including the valid-release-readiness fixture.
    docs_updates:
      - docs/release-and-upgrade.md
      - docs/governance-enforcement-roadmap.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/docs/governance-enforcement-roadmap.md
    known_limitations:
      - release_readiness remains optional and declarative
      - no release orchestration, scheduling, GitHub mutation, or provider behavior is introduced
    unresolved_questions: []

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Model release readiness as explicit optional governance evidence.
    acceptance_criteria:
      - release-readiness artifact shape is documented before implementation
      - artifact can list release blockers, blocked issues, issue ordering, external credentials, non-executable checks, and draft PRs
      - model distinguishes done, preparatory, blocked, and ready for release states
      - design does not make PolicyFlow a release orchestrator or scheduler
    approved_scope:
      - release docs
      - governance roadmap
      - workflow template guidance
      - fixture and tests
    non_goals:
      - no release orchestration
      - no scheduling behavior
      - no validator requirement for release_readiness
      - no GitHub mutation or provider integration
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Optional evidence shape can be documented and validated as tolerated workflow data without runtime ownership.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Release readiness belongs in governance evidence, not in runtime scheduling or release execution.
    approved_scope:
      - release_readiness documentation
      - optional template comments
      - fixture coverage
      - docs tests
    module_boundaries:
      - docs own the artifact contract
      - templates show optional placement
      - validator only proves the optional block remains compatible
    contract_impact: Consumer-Repos gain an optional evidence convention without stricter schema requirements.
    risk_review_decision: MEDIUM risk is appropriate for a new governance evidence convention.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep release_readiness optional
      - avoid CLI/runtime behavior changes
      - document that PolicyFlow is not a scheduler or release orchestrator
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Release readiness is now documented as optional workflow evidence that can list blockers, blocked issues, ordering, credentials, non-executable checks, and draft PRs.
    changed_files:
      - docs/release-and-upgrade.md
      - docs/governance-enforcement-roadmap.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/docs/governance-enforcement-roadmap.md
      - workflows/templates/feature-workflow.template.yml
      - workflows/templates/bugfix-workflow.template.yml
      - workflows/templates/architecture-change-workflow.template.yml
      - workflows/templates/low-risk-workflow.template.yml
      - policyflow/assets/workflows/templates/feature-workflow.template.yml
      - policyflow/assets/workflows/templates/bugfix-workflow.template.yml
      - policyflow/assets/workflows/templates/architecture-change-workflow.template.yml
      - policyflow/assets/workflows/templates/low-risk-workflow.template.yml
      - tests/fixtures/valid-release-readiness.yml
      - tests/test_repository_docs.py
      - tests/test_validator.py
      - workflows/features/release-readiness-governance.yml
    test_summary: Added docs assertions for release readiness shape/template references and a validator fixture proving optional release_readiness evidence remains accepted.
    docs_updates:
      - docs/release-and-upgrade.md
      - docs/governance-enforcement-roadmap.md
      - policyflow/assets/docs/release-and-upgrade.md
      - policyflow/assets/docs/governance-enforcement-roadmap.md
    known_limitations:
      - No validator requirement, release scheduler, or orchestrator behavior is introduced.
    unresolved_questions: []

overrides: []

runtime:
  status: handoff_pending
  current_phase: implementation
  active_agent: review-agent
  last_transition: implementation completed and ready for review
  block_reason:

handoffs:
  - from_phase: implementation
    to_phase: review
    status: pending
    required_inputs:
      - implementation_summary
      - changed_files
      - test_summary
    produced_outputs:
      - review_findings
      - residual_risk
    blockers: []
    override_refs: []

workflow:
  id: audit-governance-summaries
  name: Audit Governance Summaries
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Include loop and evaluation governance summaries in policyflow audit output.

context:
  workflow_file: workflows/features/audit-governance-summaries.yml
  issue_key: "#85"
  goal: Include loop and evaluation governance summaries in audit output.
  scope:
    - additive audit JSON fields for loop governance
    - additive audit JSON fields for evaluation governance
    - human-readable audit line summaries for loop and evaluation state
    - tests proving existing workflow audit fields remain present
  non_goals:
    - no schema changes
    - no validator semantic changes
    - no runtime execution, scheduler, memory, or orchestration behavior
    - no provider-specific metric or loop execution
  affected_modules:
    - policyflow/reporting.py
    - tests/test_runtime_cli.py
    - workflows/features/audit-governance-summaries.yml
  risk_level: MEDIUM
  confidence:
    planning: Issue #85 extends an existing consumer-facing audit payload, so compatibility is explicitly in scope.
    implementation: Changes should be additive and read-only over existing validated workflow data and validation errors.
    tests: CLI audit JSON and human-readable tests can prove new summaries while preserving existing fields.
    residual_uncertainty: Later v1.4 issues may stabilize additional audit JSON contracts and documentation.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none


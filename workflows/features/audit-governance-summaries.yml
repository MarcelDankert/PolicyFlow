contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Extend policyflow audit output with loop and evaluation governance summaries.
    acceptance_criteria:
      - existing workflow audit output remains backward compatible
      - audit output summarizes missing or failing loop and evaluation governance
      - JSON output includes machine-readable compliance fields
    approved_scope:
      - policyflow/reporting.py
      - tests/test_runtime_cli.py
      - workflows/features/audit-governance-summaries.yml
    non_goals:
      - no schema changes
      - no validator semantic changes
      - no runtime or provider execution
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Additive fields and focused CLI tests can preserve audit compatibility while exposing broader governance summaries.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Audit summaries should remain a reporting layer over validated workflow data, not a second governance engine.
    approved_scope:
      - additive audit JSON fields
      - human-readable audit summaries
      - CLI tests
    module_boundaries:
      - policyflow/reporting.py owns audit payload shaping
      - policyflow/cli.py should continue to delegate JSON rendering
      - validator semantics remain unchanged
    contract_impact: Existing audit fields must remain present; new loop and evaluation fields are additive.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep existing audit payload keys
      - no external artifact reads
      - no runtime execution behavior
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Extended audit reporting with additive loop_governance and evaluation summaries while preserving existing workflow audit fields.
    changed_files:
      - policyflow/reporting.py
      - tests/test_runtime_cli.py
      - workflows/features/audit-governance-summaries.yml
    test_summary: Added CLI tests for valid, missing, and invalid loop/evaluation governance audit summaries.
    docs_updates:

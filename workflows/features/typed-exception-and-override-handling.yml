workflow:
  id: typed-exception-and-override-handling
  name: Typed Exception And Override Handling
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Add typed workflow overrides with PR-visible confirmation and GitHub-enforced validation.

context:
  workflow_file: workflows/features/typed-exception-and-override-handling.yml
  issue_key: PF-GOV-06
  goal: Make approved process exceptions explicit, typed, auditable, and visible in PR governance without introducing a runtime approval engine.
  scope:
    - typed override schema for workflow exceptions
    - validator checks for override completeness and approval metadata
    - PR template and validate-pr support for visible override confirmation
    - documentation, templates, examples, and fixtures for typed overrides
  non_goals:
    - no runtime approval engine
    - no GitHub reviewer identity verification
    - no automatic expiry or reapproval engine
    - no runtime orchestration dispatch
  affected_modules:
    - policyflow
    - github
    - workflows
    - tests
    - README.md
    - docs/getting-started.md
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
    - phase: review
      state: pending
    - phase: qa

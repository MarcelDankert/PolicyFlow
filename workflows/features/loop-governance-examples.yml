workflow:
  id: loop-governance-examples
  name: Loop Governance Examples
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Add Loop Governance examples for common Consumer-Repo feedback loops.

context:
  workflow_file: workflows/features/loop-governance-examples.yml
  issue_key: "#78"
  goal: Add examples for review, QA, security, human arbitration, and Querypilot-inspired SQL safety loops without introducing runtime execution ownership.
  scope:
    - canonical loop governance example workflow
    - example tests for common feedback loops
    - loop governance example documentation
    - fixture references for max iteration, stop condition, and escalation failures
  non_goals:
    - no loop execution
    - no scheduler, message routing, memory, or provider runtime integration
    - no new validator semantics
    - no provider SDK or credential coupling
  affected_modules:
    - workflows/examples
    - docs/loop-governance.md
    - policyflow/assets/docs/loop-governance.md
    - tests/test_validator.py
    - tests/test_repository_docs.py
    - workflows/features
  risk_level: MEDIUM
  confidence:
    planning: Scope follows issue #78 and builds on completed Loop Governance validators.
    implementation: Examples and docs can reuse existing schema and validator behavior.
    tests: Tests will validate the example workflow and doc fixture references.
    residual_uncertainty: Issue #79 will expand user-facing Loop Governance documentation.


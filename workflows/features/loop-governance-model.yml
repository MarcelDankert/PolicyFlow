workflow:
  id: loop-governance-model
  name: Loop Governance Model
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Add typed models for declarative Loop Governance.

context:
  workflow_file: workflows/features/loop-governance-model.yml
  issue_key: "#74"
  goal: Add typed Loop Governance models for loop identity, phases, feedback sources, iteration fields, stop conditions, escalation conditions, evidence references, and status.
  scope:
    - typed Loop Governance models
    - schema normalization for loop_governance
    - validator tests and fixtures for valid and invalid loop declarations
  non_goals:
    - no max_iterations compliance validation
    - no stop condition compliance validation
    - no escalation rule compliance validation
    - no loop execution, scheduling, message routing, memory, or provider runtime integration
  affected_modules:
    - policyflow/models.py
    - policyflow/schemas.py
    - tests/test_validator.py
    - tests/fixtures
    - workflows/features
  risk_level: MEDIUM
  confidence:
    planning: Scope follows issue #74 and builds on the merged Loop Governance schema definition.
    implementation: Model work is bounded to typed parsing and normalization, not validator semantics.
    tests: Valid and invalid loop fixture tests will verify typed access and missing-field behavior.
    residual_uncertainty: Later issues will define iteration, stop-condition, and escalation validation semantics.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Loop Governance model scope and non-goals were locked before implementation.
    scope_locked:
      - typed loop governance models
      - loop_governance schema normalization
      - valid and invalid loop fixtures
    non_goals_locked:
      - no validator compliance semantics
      - no loop execution
      - no scheduler, message routing, or memory
    risk_rationale: MEDIUM risk because typed models define future Consumer-Repo contract shape.
  architecture-check:
    decision: Keep Loop Governance typed as declarative metadata separate from runtime loop execution.
    constraints:
      - no runtime execution ownership
      - no provider SDK or credential coupling
      - leave compliance validation to later issues
    approval_path: architecture-agent review
  implementation:
    summary: Added optional typed Loop Governance models, preserved loop_governance during schema normalization, and covered valid plus invalid loop declarations.
    changed_files:
      - policyflow/models.py
      - policyflow/schemas.py
      - tests/test_validator.py
      - tests/fixtures/valid-loop-governance-schema.yml
      - tests/fixtures/loop-governance-empty-loops.yml
      - tests/fixtures/loop-governance-missing-evidence-refs.yml
    test_summary: Targeted loop governance tests, full validator tests, full pytest suite, active workflow validation, and standard example workflow validation passed.
    docs_updates:
      - none
    known_limitations:
      - max_iterations compliance validation remains deferred
      - stop and escalation rule compliance remains deferred
    unresolved_questions:
      - none


      - pytest -q tests/test_repository_docs.py
      - policyflow validate examples/reference-consumer/ai/workflows/features/v2-reference-governance.yml
    limitations:
      - no hosted runtime is included
      - no provider credentials are required
      - provider-specific overlays remain outside this reference
  qa:

workflow:
  id: reference-consumer-project
  name: Reference Consumer Project
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Add a maintained reference Consumer-Repo path for v2 governance.

context:
  workflow_file: workflows/features/reference-consumer-project.yml
  issue_key: "#93"
  goal: Provide a maintained reference Consumer-Repo path that demonstrates v2 governance without hosted runtime or provider credentials.
  scope:
    - reference Consumer-Repo example under examples
    - bootstrap, doctor, workflow validation, loop governance, evaluation governance, and audit reporting documentation
    - golden smoke coverage for the reference path
    - getting-started cross-link
    - packaged docs asset updates if getting-started changes
  non_goals:
    - no hosted runtime
    - no provider credentials
    - no provider SDK coupling
    - no workflow engine, scheduler, message bus, memory, or merge bot behavior
    - no validator semantic changes
    - no release publication
  affected_modules:
    - examples/reference-consumer/
    - tests/test_golden_consumer_smoke.py
    - docs/getting-started.md
    - policyflow/assets/docs/getting-started.md
    - workflows/features/reference-consumer-project.yml
  risk_level: MEDIUM
  confidence:
    planning: Issue #93 scope is bounded to examples, docs, and golden smoke tests.
    implementation: Existing bootstrap, doctor, audit, loop, evaluation, and provider-neutral integration docs define the reference path.
    tests: Golden smoke tests can exercise the reference files without external credentials or hosted runtime dependencies.
    residual_uncertainty: Future pilots may add provider-specific overlays, but this reference must remain provider-neutral.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none
  approval_evidence:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Issue #93 scope, non-goals, MEDIUM risk, and reference Consumer-Repo boundary were fixed before implementation.
    scope_locked:
      - reference Consumer-Repo example
      - golden smoke coverage
      - getting-started link
      - packaged docs parity
    non_goals_locked:
      - no hosted runtime
      - no provider credentials
      - no provider SDK coupling
      - no validator semantic changes
    risk_rationale: MEDIUM risk because the reference path affects Consumer-Repo adoption expectations without changing runtime or validation semantics.
  architecture-check:
    decision: Add the reference as static Consumer-Repo assets and tests, not as a hosted runtime or provider integration.
    constraints:
      - demonstrate bootstrap, doctor, validation, loop, evaluation, and audit reporting
      - keep external execution out of PolicyFlow
      - keep provider credentials out of the example
      - avoid changing validator behavior
    approval_path: architecture-agent, review-agent, and qa-agent review
  implementation:
    summary: Added a static reference Consumer-Repo, golden smoke coverage, and getting-started discoverability.
    changed_files:
      - examples/reference-consumer/README.md
      - examples/reference-consumer/policyflow.yml
      - examples/reference-consumer/policyflow.runners.yml

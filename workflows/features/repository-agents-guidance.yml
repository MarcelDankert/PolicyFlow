workflow:
  id: repository-agents-guidance
  type: documentation

context:
  workflow_file: workflows/features/repository-agents-guidance.yml
  goal: Add root AGENTS.md guidance for contributors and coding agents working on PolicyFlow itself.
  scope:
    - root repository agent guidance
    - README discoverability link
    - documentation validation test
    - date-stable valid medium fixture for CI
  non_goals:
    - no changes to consumer agent role definitions
    - no runtime or validator behavior changes
    - no new agent role definitions
  affected_modules:
    - AGENTS.md
    - README.md
    - tests
    - tests/fixtures/valid-medium.yml
  risk_level: LOW

governance:
  required_reviews:
    - review-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none


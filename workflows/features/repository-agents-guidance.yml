    test_summary: Added and ran tests/test_repository_docs.py after confirming failures for missing AGENTS.md and machine-local public doc paths; restored valid-medium.yml so full CI no longer fails on an expired valid fixture.
    docs_updates:
      - AGENTS.md
      - README.md
    known_limitations:

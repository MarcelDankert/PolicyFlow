    owner_agent: planning-agent
    issue_brief: Add repository-level guidance for agents working on PolicyFlow itself.
    acceptance_criteria:
      - root AGENTS.md exists and is discoverable
      - guidance distinguishes PolicyFlow repo development from consumer workflow execution
      - required validation commands are listed
      - README mentions the guidance file
    approved_scope:
      - root AGENTS.md
      - README discoverability link
      - documentation validation test
      - date-stable valid medium fixture for CI
    non_goals:
      - no rewrite of existing role-agent files
      - no new agent role definitions

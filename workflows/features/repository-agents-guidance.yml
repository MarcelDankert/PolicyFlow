      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending

evidence:
  planning:
    summary: Scope and non-goals were locked before adding repository-level agent guidance.
    scope_locked:
      - root AGENTS.md
      - README discoverability link
      - documentation validation test
      - date-stable valid medium fixture for CI
    non_goals_locked:
      - no role-agent rewrites
      - no runtime behavior changes
      - no validator schema changes
    risk_rationale: LOW-risk documentation-only change with a small documentation test.

contracts:

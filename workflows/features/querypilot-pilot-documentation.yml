workflow:
  id: querypilot-pilot-documentation
  name: Querypilot Pilot Documentation
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Document Querypilot as the first Loop and Evaluation Governance pilot.

context:
  workflow_file: workflows/features/querypilot-pilot-documentation.yml
  issue_key: "#94"
  goal: Document Querypilot as the first pilot for Loop and Evaluation Governance.
  scope:
    - Querypilot pilot documentation
    - Querypilot governance goals, metrics, loops, evidence, and non-goals
    - SQL guardrail, SELECT-only, executable SQL, tests, coverage, latency, review score, and security findings examples
    - PolicyFlow versus Querypilot responsibility split
    - roadmap cross-link
    - provider-neutral workflow example
  non_goals:
    - no Querypilot implementation
    - no SQL execution in PolicyFlow
    - no hosted runtime, scheduler, message bus, memory, provider credential, provider SDK, or merge bot behavior
    - no validator semantic changes
    - no release publication
  affected_modules:
    - docs/querypilot-pilot.md
    - docs/roadmap-agentic-governance.md
    - policyflow/assets/docs/querypilot-pilot.md
    - policyflow/assets/docs/roadmap-agentic-governance.md
    - workflows/examples/querypilot-pilot-workflow.yml
    - tests/test_repository_docs.py
    - workflows/features/querypilot-pilot-documentation.yml
  risk_level: LOW
  confidence:
    planning: Issue #94 is documentation and example scoped after the reference Consumer-Repo path was added.
    implementation: Existing Loop Governance, Evaluation Governance, Metric Governance, and reference consumer docs provide the source contract.
    tests: Repository docs tests and workflow validation can verify the pilot documentation and example workflow.
    residual_uncertainty: Querypilot itself owns implementation details and may refine pilot metrics later.


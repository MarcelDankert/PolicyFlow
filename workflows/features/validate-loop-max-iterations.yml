workflow:
  id: validate-loop-max-iterations
  name: Validate Loop Max Iterations
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Enforce Loop Governance iteration limits structurally.

context:
  workflow_file: workflows/features/validate-loop-max-iterations.yml
  issue_key: "#75"
  goal: Validate loop max_iterations as a positive integer and ensure current_iteration does not exceed max_iterations.
  scope:
    - loop max_iterations declaration validation
    - loop current_iteration compliance validation
    - distinct declaration and compliance error messages
    - validator tests and fixtures
  non_goals:
    - no loop execution
    - no scheduler, message routing, memory, or provider runtime integration
    - no stop condition validation
    - no escalation rule validation
  affected_modules:
    - policyflow/validator.py
    - tests/test_validator.py
    - tests/fixtures
    - workflows/features
  risk_level: MEDIUM
  confidence:
    planning: Scope follows issue #75 and builds on the merged typed Loop Governance model.
    implementation: Validation can be added as declarative metadata checks without runtime behavior.
    tests: Fixtures will cover declaration and compliance failures separately.
    residual_uncertainty: Later issues will define stop condition and escalation validation semantics.


workflow:
  id: schema-normalization-and-override-lifecycle
  name: Schema Normalization And Override Lifecycle
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Tighten the canonical workflow shape incrementally and add override lifecycle handling with expiring warnings plus revalidation-required blocking.

context:
  workflow_file: workflows/features/schema-normalization-and-override-lifecycle.yml
  issue_key: PF-GOV-08
  goal: Keep the workflow schema coherent while making override review and expiry windows operationally meaningful in validation and runtime flow checks.
  scope:
    - incremental schema normalization around workflow validation entry points
    - override lifecycle derivation for active expiring and revalidation_required states
    - non-blocking warning output for expiring overrides
    - blocking validation for overrides that require revalidation
    - handoff protection when override references have expired
  non_goals:
    - no GitHub reviewer identity checks
    - no reporting dashboard
    - no new runtime commands
    - no real agent execution
  affected_modules:
    - policyflow
    - workflows
    - tests
    - README.md
    - docs/getting-started.md
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: PR 8 scope and non-goals were locked before code changes.
    scope_locked:
      - incremental schema normalization
      - override lifecycle derivation
      - warning and revalidation handling
    non_goals_locked:
      - no approval hardening
      - no reporting UI
    risk_rationale: MEDIUM risk because validator behavior changes, but the slice remains bounded to schema and lifecycle checks.
  architecture-check:
    decision: Keep the normalization incremental and derive lifecycle states from existing override fields instead of introducing a new broad schema layer.
    constraints:
      - no large workflow schema rewrite
      - warnings must stay non-blocking
      - revalidation must block reused override references
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock the bounded lifecycle hardening slice before implementation.
    acceptance_criteria:
      - expiring overrides produce warnings
      - revalidation-required overrides fail validation
      - handoffs cannot keep expired override references active
    approved_scope:
      - incremental schema normalization
      - override lifecycle derivation
      - warning and revalidation handling
    non_goals:
      - no approval hardening
      - no reporting UI
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: The slice is small enough to implement without widening runtime orchestration scope.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Lifecycle state should be derived from the existing override review or expiry fields so the schema remains incremental and compatible.
    approved_scope:
      - incremental schema normalization
      - override lifecycle derivation
      - warning and revalidation handling
    module_boundaries:
      - policyflow validator
      - policyflow CLI
      - workflows and docs
    contract_impact: No new workflow engine or approval integration is added in this slice.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - derive lifecycle from review_by or expires_on only
      - keep expiring non-blocking and revalidation_required blocking

overrides:
  - id: phase-bypass-1
    type: phase_bypass
    reason: Review guidance can be finalized while lifecycle warning behavior is still being polished in the same bounded slice.
    scope_impact: No scope expansion beyond schema normalization and override lifecycle handling.
    risk_impact: MEDIUM risk remains unchanged because compensating controls are explicit.
    mitigations:
      - review findings must still be resolved before QA completion
    approved_by: architecture-agent
    approval_reference: ARCH-OVERRIDE-PR8
    review_by: 2099-12-31
    bypassed_phase: review
    compensating_controls:
      - review findings tracked in the PR before QA sign-off

runtime:
  status: handoff_pending
  current_phase: architecture-check
  active_agent: senior-dev-agent
  last_transition: architecture-check completed and ready for implementation handoff
  block_reason:

handoffs:
  - from_phase: architecture-check
    to_phase: implementation
    status: pending
    required_inputs:
      - architecture_assessment
      - implementation_constraints
    produced_outputs:
      - implementation_summary
      - lifecycle_validation_notes
    blockers: []
    override_refs:
      - phase-bypass-1


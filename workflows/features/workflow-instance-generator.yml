workflow:
  id: workflow-instance-generator
  type: feature

context:
  workflow_file: workflows/features/workflow-instance-generator.yml
  issue: https://github.com/MarcelDankert/PolicyFlow/issues/42
  goal: Add a policyflow new-workflow command that creates valid workflow instances from PolicyFlow defaults without manual template copying.
  scope:
    - new-workflow service and CLI command
    - feature, bugfix, architecture-change, and low-risk workflow generation
    - risk-aware phases, reviews, evidence, contracts, runtime, handoff defaults
    - consumer config path integration
    - dry-run and overwrite protection
    - docs and golden smoke coverage for first workflow generation
  non_goals:
    - no interactive wizard
    - no automatic issue parsing
    - no AI-generated scope or risk decisions
    - no automatic PR creation
  affected_modules:
    - policyflow
    - tests
    - docs
    - workflows/features/workflow-instance-generator.yml
  risk_level: MEDIUM
  confidence:
    planning: Scope is bounded to deterministic workflow generation and docs/tests.
    implementation: The generator can reuse existing validator-compatible starter workflow shapes.
    tests: Generated LOW, MEDIUM, and HIGH workflows can be validated directly through PolicyFlow tests.
    residual_uncertainty: Future interactive or issue-derived workflows remain out of scope.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Issue #42 scope and non-goals were locked before implementation.
    scope_locked:
      - new-workflow service and CLI command
      - feature, bugfix, architecture-change, and low-risk workflow generation
      - risk-aware phases, reviews, evidence, contracts, runtime, handoff defaults
      - consumer config path integration
      - dry-run and overwrite protection
      - docs and golden smoke coverage for first workflow generation
    non_goals_locked:
      - no interactive wizard
      - no automatic issue parsing
      - no AI-generated scope or risk decisions
      - no automatic PR creation
    risk_rationale: MEDIUM risk because this adds a consumer-facing workflow creation command and generated YAML contract.
  architecture-check:
    decision: Add a deterministic generator service with a thin Typer command, using consumer config paths and validator-compatible workflow payloads.
    constraints:
      - generated workflows must validate immediately
      - existing files must not be overwritten without force
      - dry-run must be side-effect-free
      - generated workflow paths must match PR template expectations
    approval_path: architecture-agent review
  implementation:
    summary: Added workflow generator service and CLI command with valid LOW, MEDIUM, and HIGH workflow output, dry-run, overwrite protection, docs, and golden smoke coverage.
    files_changed:
      - policyflow/workflow_generator.py
      - policyflow/cli.py
      - tests/test_workflow_generator.py
      - tests/test_golden_consumer_smoke.py
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - README.md
      - workflows/features/workflow-instance-generator.yml
    tests_run:
      - pytest -q tests/test_workflow_generator.py
      - pytest -q tests/test_workflow_generator.py tests/test_golden_consumer_smoke.py
      - pytest -q tests/test_bootstrap.py tests/test_doctor.py tests/test_repository_docs.py
      - policyflow validate workflows/features/workflow-instance-generator.yml

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Consumers need a first workflow command instead of manually copying templates.
    acceptance_criteria:
      - new-workflow creates valid workflow YAML
      - LOW, MEDIUM, and HIGH generated workflows validate
      - output path follows policyflow.yml workflow path defaults
      - dry-run and overwrite protection are tested
      - docs include init to new-workflow to validate sequence
    approved_scope:
      - new-workflow service and CLI command
      - feature, bugfix, architecture-change, and low-risk workflow generation
      - risk-aware phases, reviews, evidence, contracts, runtime, handoff defaults
      - consumer config path integration
      - dry-run and overwrite protection
      - docs and golden smoke coverage for first workflow generation
    non_goals:
      - no interactive wizard
      - no automatic issue parsing
      - no AI-generated scope or risk decisions
      - no automatic PR creation
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium confidence; generated output can be validated in temp Consumer-Repo fixtures.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: A dedicated service keeps generation logic reusable by CLI, tests, and future onboarding flows.
    approved_scope:
      - new-workflow service and CLI command
      - feature, bugfix, architecture-change, and low-risk workflow generation
      - risk-aware phases, reviews, evidence, contracts, runtime, handoff defaults
      - consumer config path integration
      - dry-run and overwrite protection
      - docs and golden smoke coverage for first workflow generation
    module_boundaries:
      - policyflow.workflow_generator owns workflow payload creation and filesystem behavior
      - policyflow.cli exposes new-workflow and prints actions
      - policyflow.validator remains the contract verifier
    contract_impact: Introduces a generated workflow instance shape that consumers can use directly after bootstrap.
    risk_review_decision: MEDIUM risk accepted with generated workflow validation tests.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - do not infer issue scope automatically
      - do not overwrite existing workflows unless force is explicit
      - keep generated YAML deterministic
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Implemented `policyflow new-workflow` through a deterministic generator service that writes validator-compatible workflow instances under the Consumer-Repo workflow root from `policyflow.yml`.
    changed_files:
      - policyflow/workflow_generator.py
      - policyflow/cli.py
      - tests/test_workflow_generator.py
      - tests/test_golden_consumer_smoke.py
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - README.md
      - workflows/features/workflow-instance-generator.yml
    test_summary: Added red-first generator tests for LOW/MEDIUM/HIGH valid workflows, dry-run, overwrite protection, force overwrite, and CLI creation; golden smoke now creates and validates a first generated workflow.
    docs_updates:
      - README.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
    known_limitations:
      - no interactive wizard
      - no issue parsing
      - no AI-generated scope or risk decision
    unresolved_questions:
      - none

overrides: []

runtime:
  status: idle
  current_phase:
  active_agent:
  last_transition: architecture-check completed
  block_reason:

handoffs: []

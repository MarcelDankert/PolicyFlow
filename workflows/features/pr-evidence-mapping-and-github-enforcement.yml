workflow:
  id: pr-evidence-mapping-and-github-enforcement
  name: PR Evidence Mapping And GitHub Enforcement
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Map PR claims to workflow evidence references and enforce the checks in PolicyFlow's own GitHub workflow.

context:
  workflow_file: workflows/features/pr-evidence-mapping-and-github-enforcement.yml
  issue_key: PF-GOV-04
  goal: Make the PR body a view onto workflow state and evidence by requiring explicit evidence references and validating them in PolicyFlow's own CI flow.
  scope:
    - PR template evidence reference section
    - PR validator checks for required workflow evidence references
    - PolicyFlow GitHub Action to validate workflows and PR bodies in this repository
    - fixtures and tests for PR evidence mapping
  non_goals:
    - no GitHub API deep metadata integration beyond PR body retrieval
    - no transition or evidence schema redesign
    - no override or exception-handling mechanism
    - no autonomous agent orchestration
  affected_modules:
    - github
    - policyflow
    - tests
    - workflows
    - README.md
    - docs/getting-started.md
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending


workflow:
  id: doctor-preflight-checks
  type: feature

context:
  workflow_file: workflows/features/doctor-preflight-checks.yml
  goal: Add doctor/preflight checks that verify Consumer-Repo readiness after bootstrap.
  scope:
    - doctor service with structured readiness report
    - doctor CLI command with text and JSON output
    - required bootstrap artifact checks
    - runner config and referenced prompt/agent asset checks
    - project context and GitHub template checks
    - tests for fresh bootstrap, missing assets, missing config, and CLI output
    - align bootstrap runner config with consumer asset paths
  non_goals:
    - no automated repair
    - no remote environment management
    - no telemetry layer
    - no strict GitHub auth gate in the first pass
  affected_modules:
    - policyflow
    - tests
    - workflows
    - docs
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and non-goals were locked before adding doctor/preflight checks.
    scope_locked:
      - doctor service with structured readiness report
      - doctor CLI command with text and JSON output
      - required bootstrap artifact checks
      - runner config and referenced prompt/agent asset checks
      - project context and GitHub template checks
      - tests for fresh bootstrap, missing assets, missing config, and CLI output
      - align bootstrap runner config with consumer asset paths
    non_goals_locked:
      - no automated repair
      - no remote environment management
      - no telemetry layer
      - no strict GitHub auth gate in the first pass
    risk_rationale: MEDIUM risk because doctor defines operational readiness semantics used by Consumer-Repos.
  architecture-check:
    decision: Use a reusable doctor service that returns structured check results, with CLI text and JSON presentation layered on top.
    constraints:
      - required local artifacts fail readiness
      - external GitHub auth/tooling remains a warning in this first pass
      - doctor must reuse the consumer config contract
      - doctor must validate runner asset references against the target repo
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Add doctor/preflight checks for Consumer-Repo readiness.
    acceptance_criteria:
      - doctor distinguishes pass, warning, and failure states
      - freshly bootstrapped Consumer-Repos pass required local checks
      - missing runner assets produce actionable remediation
      - JSON output is available for automation
      - tests cover happy path and missing required assets
    approved_scope:
      - doctor service with structured readiness report
      - doctor CLI command with text and JSON output
      - required bootstrap artifact checks
      - runner config and referenced prompt/agent asset checks
      - project context and GitHub template checks
      - tests for fresh bootstrap, missing assets, missing config, and CLI output
      - align bootstrap runner config with consumer asset paths
    non_goals:
      - no automated repair
      - no remote environment management
      - no telemetry layer
      - no strict GitHub auth gate in the first pass
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Medium confidence; doctor checks are local, structured, and covered through temp-directory bootstrap tests.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Separating doctor service logic from CLI formatting keeps readiness checks reusable by future bootstrap, CI, and golden smoke tests.
    approved_scope:
      - doctor service with structured readiness report
      - doctor CLI command with text and JSON output
      - required bootstrap artifact checks
      - runner config and referenced prompt/agent asset checks
      - project context and GitHub template checks
      - tests for fresh bootstrap, missing assets, missing config, and CLI output
      - align bootstrap runner config with consumer asset paths
    module_boundaries:
      - policyflow.doctor owns readiness checks and structured report
      - policyflow.cli exposes doctor command and exit behavior
      - policyflow.bootstrap must generate runner config paths doctor can validate
    contract_impact: Introduces the first doctor report shape with ready, failures, warnings, and checks fields.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - do not require network access for the happy path
      - keep messages actionable
      - keep generated paths relative and public-repo safe
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Added doctor/preflight service and CLI output, local readiness checks for config/bootstrap/runner/project-context/GitHub templates, and aligned bootstrap runner config paths with consumer assets.
    changed_files:
      - policyflow/doctor.py
      - policyflow/bootstrap.py
      - policyflow/cli.py
      - docs/getting-started.md
      - tests/test_doctor.py
      - workflows/features/doctor-preflight-checks.yml
    test_summary: Added red-first doctor tests for fresh bootstrap, missing runner asset, missing config, JSON CLI output, and missing project context CLI failure; all pass after implementation.
    docs_updates:
      - docs/getting-started.md
    known_limitations:
      - GitHub CLI/auth is reported as warning-level readiness in this first pass
      - automated repair is deferred to follow-up work
    unresolved_questions:
      - none

overrides: []

runtime:
  status: idle
  current_phase:
  active_agent:
  last_transition: architecture-check completed
  block_reason:

handoffs: []

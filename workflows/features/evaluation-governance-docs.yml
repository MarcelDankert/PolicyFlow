workflow:
  id: evaluation-governance-docs
  name: Evaluation Governance Docs
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Document how Consumer-Repos should use Evaluation Governance.

context:
  workflow_file: workflows/features/evaluation-governance-docs.yml
  issue_key: "#72"
  goal: Explain Evaluation Governance scope, non-scope, required fields, evidence, and examples for Consumer-Repos.
  scope:
    - docs/evaluation-governance.md
    - docs/getting-started.md link and short guidance
    - README.md link and short guidance
    - packaged docs copies
    - docs tests for the new guidance
  non_goals:
    - no schema changes
    - no validator behavior changes
    - no evaluation tooling execution
    - no provider-specific CI, scanner, benchmark, or review integration
  affected_modules:
    - README.md
    - docs
    - policyflow/assets/docs
    - tests/test_repository_docs.py
  risk_level: LOW
  confidence:
    planning: Issue #72 is a documentation-only slice after the evaluation examples shipped.
    implementation: Changes are limited to consumer-facing docs and docs tests.
    tests: Repository docs tests and workflow validation cover the changed guidance.
    residual_uncertainty: Review should confirm whether more links belong in future onboarding docs.

governance:
  required_reviews:
    - review-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none


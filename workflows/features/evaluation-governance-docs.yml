      - docs/evaluation-governance.md
      - docs/getting-started.md
      - policyflow/assets/docs/evaluation-governance.md
      - policyflow/assets/docs/getting-started.md
      - tests/test_repository_docs.py
      - workflows/features/evaluation-governance-docs.yml
    test_summary: Repository docs and packaging tests, full pytest suite, and active workflow validation passed.
    docs_updates:

      - repository documentation tests
    non_goals_locked:
      - no validator behavior changes
      - no loop execution
      - no scheduler, message routing, memory, or provider runtime integration
    risk_rationale: LOW risk because this is bounded documentation and tests.
  implementation:
    summary: Expanded Loop Governance documentation, linked it from getting-started and README, synced packaged documentation mirrors, and updated repository documentation tests.
    changed_files:
      - docs/loop-governance.md
      - policyflow/assets/docs/loop-governance.md
      - docs/getting-started.md
      - policyflow/assets/docs/getting-started.md
      - README.md
      - tests/test_repository_docs.py
    test_summary: Focused Loop Governance documentation test, full repository documentation tests, full pytest suite, active workflow validation, loop example validation, and standard example workflow validation passed.
    docs_updates:
      - docs/loop-governance.md
      - docs/getting-started.md
      - README.md
    known_limitations:

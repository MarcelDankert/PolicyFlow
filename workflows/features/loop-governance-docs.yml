workflow:
  id: loop-governance-docs
  name: Loop Governance Docs
  version: 1
  type: feature
  status: active
  template_reference: workflows/templates/feature-workflow.template.yml
  description: Document Loop Governance usage and boundaries.

context:
  workflow_file: workflows/features/loop-governance-docs.yml
  issue_key: "#79"
  goal: Document Loop Governance usage, boundaries, fields, evidence, escalation expectations, and link the guide from README and getting-started docs.
  scope:
    - expand docs/loop-governance.md
    - sync packaged loop governance doc mirror
    - link loop governance from docs/getting-started.md
    - link loop governance from README.md
    - repository documentation tests
  non_goals:
    - no validator behavior changes
    - no schema changes
    - no loop execution
    - no scheduler, message routing, memory, or provider runtime integration
  affected_modules:
    - docs/loop-governance.md
    - policyflow/assets/docs/loop-governance.md
    - docs/getting-started.md
    - README.md
    - tests/test_repository_docs.py
    - workflows/features
  risk_level: LOW
  confidence:
    planning: Scope follows issue #79 and builds on the shipped Loop Governance schema, validators, and examples.
    implementation: Documentation-only changes can preserve existing behavior and asset mirrors.
    tests: Repository documentation tests will verify guide structure, mirrored docs, and README/getting-started links.
    residual_uncertainty: Review should confirm wording stays provider-neutral and non-runtime.

governance:
  required_reviews:
    - review-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: in_progress


handoff_example:
  workflow_file: workflows/examples/example-feature-workflow.yml
  risk_level: MEDIUM
  confidence:
    planning: Scope and risk are stable enough for architecture review.
    implementation: Implementation is bounded by the declared module constraints.
    tests: Direct workflow validation and focused regression checks are planned.
    residual_uncertainty: Review must confirm no hidden contract impact.
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: no
  escalation_required: no
  protected_areas_touched:
    - none
  approval_evidence:
    - none required for current classification
  execution:
    mode: strict
    phases:
      - phase: planning
        state: completed
      - phase: architecture-check
        state: completed
      - phase: implementation
        state: pending
      - phase: review
        state: pending
      - phase: qa
        state: pending
  evidence:
    planning:
      summary: Scope and risk were locked before the handoff.
      scope_locked:
        - workflow and documentation change
      non_goals_locked:
        - no runtime implementation
      risk_rationale: Bounded MEDIUM-risk handoff.
    architecture-check:
      decision: Architecture check completed before implementation handoff.
      constraints:
        - keep work inside the approved scope
      approval_path: architecture-agent review
  step:
    agent: planning-agent
    input_artifacts:
      - approved issue
    output_artifacts:
      - issue_brief
      - acceptance_criteria
      - non_goals
      - initial_risk_level
      - protected_areas_touched
      - confidence_summary
      - escalation_flags
    handoff_to: architecture-agent
    handoff_conditions:
      - planning artifacts exist
    stop_conditions:
      - scope ambiguous
    escalation_conditions:
      - risk level unclear

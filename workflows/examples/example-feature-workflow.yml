workflow:
  id: example-feature-workflow
  type: feature
  # Example usage for all consumer repos:
  # create the workflow before implementation
  # use it to steer the work from the start
  # allow only same-scope clarifications in the same PR
  # do not silently expand scope, non_goals, or risk
context:
  workflow_file: workflows/examples/example-feature-workflow.yml
  goal: Add a bounded reporting capability
  scope:
    - reporting endpoint
    - validation
  non_goals:
    - no protected business logic changes
  affected_modules:
    - runtime layer
  risk_level: MEDIUM
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Scope and non-goals were locked before implementation.
    scope_locked:
      - reporting endpoint
      - validation
    non_goals_locked:
      - no protected business logic changes
    risk_rationale: Bounded MEDIUM-risk workflow update.
  architecture-check:
    decision: Architecture check completed before coding.
    constraints:
      - keep the change inside the runtime layer
    approval_path: architecture-agent review

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock the bounded reporting scope before implementation.
    acceptance_criteria:
      - reporting endpoint remains inside scope
      - validation remains inside scope
    approved_scope:
      - reporting endpoint
      - validation
    non_goals:
      - no protected business logic changes
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Scope and risk are stable enough for architecture review.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture check kept the change inside the runtime layer.
    approved_scope:
      - reporting endpoint
      - validation
    module_boundaries:
      - runtime layer
    contract_impact: No contract changes required.
    risk_review_decision: MEDIUM risk path approved.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep the change inside the runtime layer

overrides:
  - id: phase-bypass-1
    type: phase_bypass
    reason: Review begins with a bounded overlap so validation can start earlier without widening scope.
    scope_impact: No scope expansion beyond the reporting endpoint and validation slice.
    risk_impact: MEDIUM risk remains unchanged because compensating controls are explicit.
    mitigations:
      - review findings must still be resolved before QA completion
    approved_by: architecture-agent
    approval_reference: ARCH-OVERRIDE-1
    review_by: 2026-06-30
    bypassed_phase: review
    compensating_controls:
      - review findings tracked in the PR before QA sign-off

runtime:
  status: handoff_pending
  current_phase: architecture-check
  active_agent: senior-dev-agent
  last_transition: architecture-check completed and ready for implementation handoff
  block_reason:

handoffs:
  - from_phase: architecture-check
    to_phase: implementation
    status: pending
    required_inputs:
      - architecture_assessment
      - implementation_constraints
    produced_outputs:
      - implementation_summary
      - test_summary
    blockers: []
    override_refs:
      - phase-bypass-1


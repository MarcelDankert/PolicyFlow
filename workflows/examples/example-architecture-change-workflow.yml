workflow:
  id: example-architecture-change-workflow
  type: architecture-change
  # Example usage for all consumer repos:
  # create the workflow before implementation
  # use it to steer the work from the start
  # allow only same-scope clarifications in the same PR
  # do not silently expand scope, non_goals, or risk
context:
  workflow_file: workflows/examples/example-architecture-change-workflow.yml
  change_goal: Split a boundary more explicitly
  current_state: Runtime and data responsibilities are too loosely described
  proposed_state: Responsibilities are explicitly separated
  scope:
    - boundary split
    - handoff clarification
  non_goals:
    - no runtime behavior expansion
  affected_modules:
    - runtime layer
    - data layer
  risk_level: HIGH
  confidence:
    planning: Planning confidence is documented before implementation.
    implementation: Implementation confidence is bounded by declared scope and constraints.
    tests: Test confidence is based on declared validation evidence.
    residual_uncertainty: Residual uncertainty is tracked in review and QA.
governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
    - human approval
  human_approval_required: true
  escalation_required: true
  protected_areas_touched:
    - architecture boundary
  approval_evidence:
    - human approval recorded before implementation

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: completed
    - phase: review
      state: completed
    - phase: qa
      state: completed
    - phase: approval
      state: completed

evidence:
  planning:
    summary: Architecture change scope and non-goals were locked before implementation.
    scope_locked:
      - boundary split
      - handoff clarification
    non_goals_locked:
      - no runtime behavior expansion
    risk_rationale: HIGH-risk path due to architecture boundary impact.
  architecture-check:
    decision: Architecture review completed before implementation.
    constraints:
      - preserve approval path and explicit scope
    approval_path: architecture-agent review plus human approval
  review:
    outcome: approved
    findings_summary: Review completed with no blocking issues.
    residual_risk: bounded residual change-management risk only
  qa:
    outcome: passed
    evidence_summary: QA evidence completed successfully.
    unresolved_risks:
      - none
  approval:
    approved_by: arch-board
    reference: ARCH-2026-01
    scope_confirmed: true

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Lock the architecture boundary split before implementation.
    acceptance_criteria:
      - boundary split remains explicit
      - handoff clarification stays inside scope
    approved_scope:
      - boundary split
      - handoff clarification
    non_goals:
      - no runtime behavior expansion
    initial_risk_level: HIGH
    protected_areas_touched:
      - architecture boundary
    confidence_summary: HIGH-risk path is required because an architecture boundary is touched.
    escalation_flags:
      - human approval required
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Architecture review confirmed the protected boundary split path.
    approved_scope:
      - boundary split
      - handoff clarification
    module_boundaries:
      - runtime layer
      - data layer
    contract_impact: No runtime behavior expansion is allowed.
    risk_review_decision: HIGH risk with explicit human approval.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
      - human approval
    implementation_constraints:
      - preserve approval path and explicit scope
  implementation:
    owner_agent: senior-dev-agent
    implementation_summary: Implemented the approved boundary split and handoff clarification.
    changed_files:
      - runtime/layer
      - data/layer
    test_summary: Implementation stayed within the approved architecture boundary scope.
    docs_updates:
      - architecture handoff documentation
    known_limitations:
      - no runtime behavior expansion
    unresolved_questions:
      - none
  review:
    owner_agent: review-agent
    review_findings:
      - no blocking issues remain
    required_fixes:
      - none
    severity: none
    approval_status: approved
    review_approval: Review approved for QA handoff.
    residual_risk: bounded residual change-management risk only
    qa_focus_areas:
      - architecture boundary regression coverage
    test_expectations:
      - QA evidence remains green
  qa:
    owner_agent: qa-agent
    qa_report: QA evidence confirmed the approved architecture path.
    quality_gate_status: passed
    unresolved_risks:
      - none
    approval_required: true
    merge_readiness: false


workflow:
  id: example-architecture-change-workflow
  type: architecture-change
  # Example usage for all consumer repos:
  # create the workflow before implementation
  # use it to steer the work from the start
  # allow only same-scope clarifications in the same PR
  # do not silently expand scope, non_goals, or risk
context:
  workflow_file: workflows/examples/example-architecture-change-workflow.yml
  change_goal: Split a boundary more explicitly
  current_state: Runtime and data responsibilities are too loosely described
  proposed_state: Responsibilities are explicitly separated
  scope:
    - boundary split
    - handoff clarification
  non_goals:
    - no runtime behavior expansion
  affected_modules:
    - runtime layer
    - data layer
  risk_level: HIGH

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
    - human approval
  human_approval_required: true
  escalation_required: true
  protected_areas_touched:
    - architecture boundary
  approval_evidence:
    - human approval recorded before implementation

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending
    - phase: approval
      state: completed

evidence:
  planning:
    summary: Architecture change scope and non-goals were locked before implementation.
    scope_locked:
      - boundary split
      - handoff clarification
    non_goals_locked:
      - no runtime behavior expansion
    risk_rationale: HIGH-risk path due to architecture boundary impact.
  architecture-check:
    decision: Architecture review completed before implementation.
    constraints:
      - preserve approval path and explicit scope
    approval_path: architecture-agent review plus human approval
  approval:
    approved_by: architecture board
    reference: ARCH-2026-01
    scope_confirmed: true

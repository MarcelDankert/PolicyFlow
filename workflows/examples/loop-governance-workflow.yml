workflow:
  id: loop-governance-workflow
  type: feature

context:
  workflow_file: workflows/examples/loop-governance-workflow.yml
  goal: Demonstrate provider-neutral Loop Governance for common Consumer-Repo feedback loops.
  scope:
    - review feedback loop
    - QA regression loop
    - security review loop
    - human arbitration loop
    - Querypilot-inspired SQL safety loop
  non_goals:
    - no loop execution
    - no scheduler
    - no message routing
    - no memory layer
    - no provider-specific SQL runtime
  affected_modules:
    - examples
  risk_level: MEDIUM
  confidence:
    planning: Loop governance criteria are declared before implementation.
    implementation: Implementation remains bounded to declared loop metadata.
    tests: Validation confirms loop declarations are structurally valid.
    residual_uncertainty: Consumer-Repos must map evidence refs to their own artifacts.

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: pending
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Loop examples and non-goals were locked before implementation.
    scope_locked:
      - review feedback loop
      - QA regression loop
      - security review loop
      - human arbitration loop
      - Querypilot-inspired SQL safety loop
    non_goals_locked:
      - no loop execution
      - no scheduler
      - no message routing
      - no memory layer
      - no provider-specific SQL runtime
    risk_rationale: MEDIUM risk because loop governance can affect Consumer-Repo merge readiness.
  architecture-check:
    decision: Keep Loop Governance declarative and evidence-reference based.
    constraints:
      - external systems perform loop work
      - PolicyFlow records and validates declarations only
      - SQL safety checks remain external to PolicyFlow
    approval_path: architecture-agent review
  review:
    outcome: approved
    findings_summary: Example review evidence used by loop references.
    residual_risk: Consumer-Repos must map refs to their own review systems.
  qa:
    outcome: passed
    evidence_summary: Example QA evidence used by loop references.
    unresolved_risks:
      - Consumer-Repos must provide their own QA artifacts.

loop_governance:
  loops:
    - id: review-feedback
      source_phase: review
      target_phase: implementation
      allowed_feedback_sources:
        - review-findings
        - human-arbitration
      max_iterations: 3
      current_iteration: 1
      status: active
      stop_conditions:
        - id: review-findings-resolved
          description: All blocking review findings are resolved.
      escalation_conditions:
        - id: repeated-review-rework
          trigger: max_iterations_exceeded
          escalate_to: human-arbitration
      evidence_refs:
        - evidence.review
        - artifact://review-thread
        - stop_conditions.review-findings-resolved
    - id: qa-regression
      source_phase: qa
      target_phase: implementation
      allowed_feedback_sources:
        - qa-findings
        - regression-test-report
      max_iterations: 2
      current_iteration: 2
      status: completed
      stop_conditions:
        - id: regression-suite-passed
          description: Regression suite passed after fixes.
      escalation_conditions:
        - id: repeated-regression-failure
          trigger: max_iterations_exceeded
          escalate_to: qa-lead
      evidence_refs:
        - evidence.qa
        - artifact://regression-report
        - stop_conditions.regression-suite-passed
    - id: security-review
      source_phase: review
      target_phase: implementation
      allowed_feedback_sources:
        - security-scan
        - review-findings
      max_iterations: 2
      current_iteration: 1
      status: escalated
      stop_conditions:
        - id: critical-findings-resolved
          description: Critical security findings are resolved or accepted through governance.
      escalation_conditions:
        - id: security-critical-findings
          trigger: critical_security_findings
          escalate_to: security-agent
      evidence_refs:
        - evidence.review
        - artifact://security-report
        - escalation_conditions.security-critical-findings
    - id: human-arbitration
      source_phase: review
      target_phase: approval
      allowed_feedback_sources:
        - human-arbitration
        - scope-dispute
      max_iterations: 1
      current_iteration: 1
      status: terminated
      stop_conditions:
        - id: arbitration-decision-recorded
          description: Human arbitration decision is recorded and linked.
      escalation_conditions:
        - id: arbitration-needed
          trigger: unresolved_scope_or_risk_dispute
          escalate_to: human-owner
      evidence_refs:
        - artifact://arbitration-decision
        - stop_conditions.arbitration-decision-recorded
    - id: querypilot-sql-safety
      source_phase: qa
      target_phase: implementation
      allowed_feedback_sources:
        - sql-safety-check
        - query-plan-review
        - human-arbitration
      max_iterations: 3
      current_iteration: 1
      status: active
      stop_conditions:
        - id: sql-safety-accepted
          description: Querypilot-inspired SQL safety loop has accepted query plan and rollback evidence.
      escalation_conditions:
        - id: unsafe-query-plan
          trigger: unsafe_query_plan_or_missing_rollback
          escalate_to: data-owner
      evidence_refs:
        - artifact://sql-plan-review
        - artifact://rollback-plan

contracts:
  planning:
    owner_agent: planning-agent
    issue_brief: Demonstrate provider-neutral Loop Governance.
    acceptance_criteria:
      - review, QA, security, human arbitration, and SQL safety loops are represented
      - examples do not introduce runtime execution ownership
    approved_scope:
      - loop governance example workflow
    non_goals:
      - no loop execution
      - no provider-specific SQL runtime
    initial_risk_level: MEDIUM
    protected_areas_touched:
      - none
    confidence_summary: Example expectations are clear enough for architecture review.
    escalation_flags:
      - none
  architecture-check:
    owner_agent: architecture-agent
    architecture_assessment: Loop Governance remains declarative metadata.
    approved_scope:
      - loop governance example workflow
    module_boundaries:
      - examples only
    contract_impact: No runtime, scheduler, memory, or provider contract is introduced.
    risk_review_decision: MEDIUM risk remains appropriate.
    required_reviews:
      - architecture-agent
      - review-agent
      - qa-agent
    implementation_constraints:
      - keep evidence refs provider-neutral
      - keep SQL safety examples declarative

overrides: []

runtime:
  status: idle
  current_phase: implementation
  active_agent: senior-dev-agent
  last_transition: architecture-check completed

handoffs: []

workflow:
  id: example-bugfix-workflow
  type: bugfix
  # Example usage for all consumer repos:
  # create the workflow before implementation
  # use it to steer the work from the start
  # allow only same-scope clarifications in the same PR
  # do not silently expand scope, non_goals, or risk
context:
  workflow_file: workflows/examples/example-bugfix-workflow.yml
  bug_summary: Fix invalid payload handling in a parser
  scope:
    - parser validation
  non_goals:
    - no contract shape changes
  affected_modules:
    - runtime layer
  risk_level: MEDIUM

governance:
  required_reviews:
    - architecture-agent
    - review-agent
    - qa-agent
  human_approval_required: false
  escalation_required: false
  protected_areas_touched:
    - none

execution:
  mode: strict
  phases:
    - phase: planning
      state: completed
    - phase: architecture-check
      state: completed
    - phase: implementation
      state: in_progress
    - phase: review
      state: pending
    - phase: qa
      state: pending

evidence:
  planning:
    summary: Bugfix scope and non-goals were locked before implementation.
    scope_locked:
      - parser validation
    non_goals_locked:
      - no contract shape changes
    risk_rationale: Bounded MEDIUM-risk bugfix.
  architecture-check:
    decision: Architecture impact check completed before coding.
    constraints:
      - keep the fix bounded to parser validation
    approval_path: architecture-agent review
